<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест загрузки фото - iPhone</title>
    <style>
        body {
            background: #0f1115;
            color: white;
            font-family: system-ui;
            padding: 20px;
        }
        button {
            background: #7aa2f7;
            border: none;
            padding: 20px;
            border-radius: 20px;
            font-size: 18px;
            width: 100%;
            margin: 10px 0;
        }
        .log {
            background: #1a1e2a;
            padding: 10px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 11px;
            margin-top: 20px;
            max-height: 500px;
            overflow: auto;
            white-space: pre-wrap;
        }
        img {
            max-width: 100px;
            margin: 5px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h2>🔧 ТЕСТ ЗАГРУЗКИ ФОТО</h2>
    <button id="btn1">📷 1. ВЫБРАТЬ ФОТО (простой способ)</button>
    <button id="btn2">📷 2. АЛЬТЕРНАТИВНЫЙ СПОСОБ</button>
    <div id="gallery"></div>
    <div class="log" id="log"></div>

    <script>
        const logDiv = document.getElementById('log');
        
        function addLog(msg) {
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<div>[${time}] ${msg}</div>`;
            console.log(msg);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // Способ 1: стандартный
        document.getElementById('btn1').onclick = () => {
            addLog('🔘 Кнопка 1 нажата');
            
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.multiple = true;
            
            input.onchange = (event) => {
                addLog(`✅ onchange СРАБОТАЛ! Файлов: ${input.files.length}`);
                
                if (input.files.length === 0) {
                    addLog('❌ Нет файлов');
                    return;
                }
                
                Array.from(input.files).forEach((file, i) => {
                    addLog(`Файл ${i+1}: ${file.name}, ${Math.round(file.size/1024)}KB, тип: ${file.type}`);
                    
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        addLog(`✅ Файл ${file.name} загружен! Длина: ${e.target.result.length}`);
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        document.getElementById('gallery').appendChild(img);
                    };
                    reader.onerror = (err) => {
                        addLog(`❌ Ошибка: ${err}`);
                    };
                    reader.readAsDataURL(file);
                });
            };
            
            input.click();
            addLog('⏳ Ожидаем выбора фото...');
        };
        
        // Способ 2: через скрытый input + анимация
        document.getElementById('btn2').onclick = () => {
            addLog('🔘 Кнопка 2 нажата (альтернативный способ)');
            
            const input = document.getElementById('hiddenInput');
            if (input) {
                input.click();
                return;
            }
            
            const newInput = document.createElement('input');
            newInput.type = 'file';
            newInput.accept = 'image/*';
            newInput.multiple = true;
            newInput.id = 'hiddenInput';
            newInput.style.position = 'absolute';
            newInput.style.left = '-9999px';
            document.body.appendChild(newInput);
            
            newInput.onchange = (event) => {
                addLog(`✅ Альтернативный onchange сработал! Файлов: ${newInput.files.length}`);
                
                if (newInput.files.length === 0) {
                    addLog('❌ Нет файлов');
                    return;
                }
                
                Array.from(newInput.files).forEach((file, i) => {
                    addLog(`Файл ${i+1}: ${file.name}, ${Math.round(file.size/1024)}KB`);
                    
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        addLog(`✅ Файл ${file.name} загружен!`);
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        document.getElementById('gallery').appendChild(img);
                    };
                    reader.onerror = (err) => {
                        addLog(`❌ Ошибка: ${err}`);
                    };
                    reader.readAsDataURL(file);
                });
            };
            
            newInput.click();
            addLog('⏳ Ожидаем выбора фото...');
        };
        
        addLog('✅ Страница загружена. Нажмите любую кнопку и выберите фото из галереи');
    </script>
</body>
</html>
