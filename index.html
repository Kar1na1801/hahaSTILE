<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Мои вещи</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, system-ui;
      color: white;
      padding: 20px;
    }
    h1 { font-size: 32px; margin-bottom: 20px; }
    .add-btn {
      background: #3a7a3a;
      border: none;
      color: white;
      font-size: 18px;
      padding: 14px;
      border-radius: 30px;
      width: 100%;
      margin-bottom: 20px;
      cursor: pointer;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }
    .photo {
      position: relative;
      aspect-ratio: 1;
    }
    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
    }
    .delete-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(0,0,0,0.7);
      border: none;
      color: red;
      border-radius: 20px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
    }
    .empty {
      text-align: center;
      padding: 50px;
      color: #666;
    }
  </style>
</head>
<body>

<h1>📸 Мои вещи</h1>
<button class="add-btn" id="addBtn">+ Добавить фото</button>
<div class="gallery" id="gallery">
  <div class="empty">Нет фото. Нажмите кнопку выше</div>
</div>

<script>
  let photos = [];

  // ЗАГРУЗКА
  function load() {
    const saved = localStorage.getItem('my_photos');
    if (saved) {
      photos = JSON.parse(saved);
      console.log('Загружено фото:', photos.length);
    }
    render();
  }

  // СОХРАНЕНИЕ
  function save() {
    localStorage.setItem('my_photos', JSON.stringify(photos));
    console.log('Сохранено фото:', photos.length);
  }

  // ДОБАВЛЕНИЕ
  function addPhoto(url) {
    photos.push({
      id: Date.now(),
      src: url,
      date: Date.now()
    });
    save();
    render();
  }

  // УДАЛЕНИЕ
  function deletePhoto(id) {
    if (confirm('Удалить?')) {
      photos = photos.filter(p => p.id !== id);
      save();
      render();
    }
  }

  // ОТРИСОВКА
  function render() {
    const container = document.getElementById('gallery');
    if (photos.length === 0) {
      container.innerHTML = '<div class="empty">📭 Нет фото. Нажмите кнопку выше</div>';
      return;
    }
    container.innerHTML = '';
    photos.forEach(photo => {
      const div = document.createElement('div');
      div.className = 'photo';
      div.innerHTML = `
        <img src="${photo.src}" onclick="window.open('${photo.src}', '_blank')">
        <button class="delete-btn" data-id="${photo.id}">✕</button>
      `;
      div.querySelector('.delete-btn').onclick = (e) => {
        e.stopPropagation();
        deletePhoto(photo.id);
      };
      container.appendChild(div);
    });
  }

  // ВЫБОР ФОТО
  document.getElementById('addBtn').onclick = () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.multiple = true;
    input.onchange = (e) => {
      const files = Array.from(e.target.files);
      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => addPhoto(ev.target.result);
        reader.readAsDataURL(file);
      });
    };
    input.click();
  };

  load();
</script>
</body>
</html>
