<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Образы по сезонам — Apple-подобная галерея</title>
  <style>
    :root{
      --bg: #0b0c0f;
      --card: #141824;
      --text: #f5f7fa;
      --muted: #a6aebf;
      --accent: #4f8cff;
      --border: rgba(255,255,255,.12);
      --shadow: 0 6px 20px rgba(0,0,0,.25);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); }
    a { color: inherit; text-decoration: none; }

    /* 基本 шапка */
    header {
      padding: 14px;
      text-align: left;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    header .logo {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, #1e1f2a, #2a2a3a);
      display: grid; place-items: center; font-weight: 700;
    }
    header h1 { font-size: 1.05rem; margin: 0; }
    header p { margin: 0; color: var(--muted); font-size: .9rem; }

    .container { padding: 12px; max-width: 1200px; margin: 0 auto; }

    /* Панель управления */
    .toolbar {
      display: grid; gap: 8px;
      grid-template-columns: 1fr auto;
      align-items: center; margin: 12px 0;
    }
    .row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; }
    .input, .select {
      width: 100%; padding: 12px;
      border-radius: 12px; border: 1px solid var(--border);
      background: #1e2030; color: var(--text);
    }
    .btn {
      background: var(--accent); color: #0b0e1a; border: none;
      padding: 12px 14px; border-radius: 12px; font-weight: 700;
      cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,.25);
    }
    .btn.secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn:active { transform: translateY(1px); }

    /* Сетки папок в Apple-стиле */
    .grid {
      display: grid; gap: 12px;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    }
    .card {
      background: linear-gradient(135deg, rgba(22,26,38,.95), rgba(20,24,32,.95));
      border: 1px solid var(--border); border-radius: 14px; padding: 12px; box-shadow: var(--shadow);
      display: flex; flex-direction: column;
      min-height: 210px;
    }
    .card-header {
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 8px;
    }
    .folder-name {
      font-weight: 700; font-size: 1rem; border: none; outline: none;
      background: transparent; color: #fff;
    }
    .badge {
      font-size: .75rem; padding: 4px 8px; border-radius: 999px; background: #2b324e; color: #fff;
    }
    .gallery {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 6px;
      padding: 6px 0;
    }
    .thumb {
      width: 100%; height: 72px; object-fit: cover; border-radius: 8px;
      border: 1px solid var(--border); cursor: pointer;
      background: #111;
    }

    /* Модальное окно просмотра фото */
    .lightbox {
      position: fixed; inset: 0; background: rgba(0,0,0,.8);
      display: none; align-items: center; justify-content: center; padding: 12px;
    }
    .lightbox.open { display: flex; }
    .lightbox-content {
      max-width: 92vw; max-height: 80vh; position: relative;
    }
    .lightbox-content img { width: 100%; height: auto; border-radius: 12px; display: block; }
    .nav { position: absolute; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border);
      background: rgba(255,255,255,.15); color: #fff; display: grid; place-items: center; cursor: pointer;
    }
    .nav.prev { left: -54px; }
    .nav.next { right: -54px; }

    /* Адаптивность без зума: крупные элементы и простая навигация */
    @media (max-width: 900px){
      .grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
    }
    @media (max-width: 600px){
      .grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
      .thumb { height: 68px; }
      .container { padding: 10px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo" aria-label="Логотип">A</div>
    <div>
      <h1>Образы по сезонам — галерея</h1>
      <p>Папки, фото и просмотр как в Apple Gallery. Мобильная версия без зума.</p>
    </div>
  </header>

  <main class="container">
    <section class="toolbar" aria-label="Управление папками">
      <div class="row" style="gap:8px;">
        <input id="newFolderName" class="input" placeholder="Название новой папки (например, Лето 2025)">
      </div>
      <div class="row" style="margin-top:8px;">
        <button id="btnAddFolder" class="btn" type="button">Добавить папку</button>
        <button id="btnExport" class="btn secondary" type="button" style="margin-left:8px;">Экспорт/Импорт</button>
      </div>
    </section>

    <section aria-label="Папки" class="grid" id="grid"></section>
  </main>

  <!-- Светлый просмотр фото -->
  <div id="lightbox" class="lightbox" role="dialog" aria-label="Просмотр фото">
    <button class="nav prev" id="lbPrev" aria-label="Предыдущее">◀</button>
    <div class="lightbox-content">
      <img id="lbImg" src="" alt="Фото">
    </div>
    <button class="nav next" id="lbNext" aria-label="Следующее">▶</button>
  </div>

  <script>
    const STORAGE_KEY = 'fashion_gallery_apple_style_v1';
    let data = { folders: [] };
    const grid = document.getElementById('grid');
    const newFolderName = document.getElementById('newFolderName');
    const btnAddFolder = document.getElementById('btnAddFolder');
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    const lbPrev = document.getElementById('lbPrev');
    const lbNext = document.getElementById('lbNext');
    let current = { folderId: null, index: 0 };

    function uid(){ return 'id_' + Math.random().toString(36).slice(2,9); }

    function load(){
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          // простая валидация структуры
          if (Array.isArray(parsed.folders)) data = parsed;
        }
      } catch (e) { console.warn('Не удалось загрузить данные', e); }
    }
    function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

    function addFolder(name){
      if (!name.trim()) return;
      const exists = data.folders.some(f => f.name.toLowerCase() === name.toLowerCase().trim());
      if (exists) {
        alert('Папка с таким названием уже существует.');
        return;
      }
      data.folders.push({ id: uid(), name: name.trim(), created: Date.now(), photos: [] });
    }

    function addPhoto(folderId, dataURL){
      const f = data.folders.find(x => x.id === folderId);
      if(!f) return;
      f.photos.push({ id: uid(), src: dataURL, date: Date.now(), done:false, important:0 });
      f.photos.sort((a,b) => a.date - b.date);
    }

    function deletePhoto(folderId, photoId){
      const f = data.folders.find(x => x.id === folderId);
      if(!f) return;
      f.photos = f.photos.filter(p => p.id !== photoId);
    }

    function movePhoto(photoId, fromFolderId, toFolderId){
      const from = data.folders.find(f => f.id === fromFolderId);
      const to = data.folders.find(f => f.id === toFolderId);
      if(!from || !to) return;
      const idx = from.photos.findIndex(p => p.id === photoId);
      if (idx < 0) return;
      const [ph] = from.photos.splice(idx, 1);
      to.photos.push(ph);
      to.photos.sort((a,b) => a.date - b.date);
    }

    function reorderPhoto(folderId, photoId, dir){
      const f = data.folders.find(x => x.id === folderId);
      if(!f) return;
      const idx = f.photos.findIndex(p => p.id === photoId);
      if (idx < 0) return;
      const ni = dir === 'up' ? idx-1 : idx+1;
      if (ni < 0 || ni >= f.photos.length) return;
      [f.photos[idx], f.photos[ni]] = [f.photos[ni], f.photos[idx]];
    }

    function toggleDone(folderId, photoId){
      const f = data.folders.find(x => x.id === folderId);
      if(!f) return;
      const p = f.photos.find(x => x.id === photoId);
      if(!p) return;
      p.done = !p.done;
      f.photos.sort((a,b) => Number(a.done) - Number(b.done) || a.date - b.date);
    }

    function openLightbox(folderId, index){
      current = { folderId, index };
      const f = data.folders.find(x => x.id === folderId);
      if(!f || f.photos.length === 0) return;
      lbImg.src = f.photos[index].src;
      lb.classList.add('open');
    }

    function closeLightbox(){ lb.classList.remove('open'); }

    function showNext(){
      const f = data.folders.find(x => x.id === current.folderId);
      if(!f) return;
      current.index = (current.index + 1) % f.photos.length;
      lbImg.src = f.photos[current.index].src;
    }
    function showPrev(){
      const f = data.folders.find(x => x.id === current.folderId);
      if(!f) return;
      current.index = (current.index - 1 + f.photos.length) % f.photos.length;
      lbImg.src = f.photos[current.index].src;
    }

    function createFileInput(forFolderId){
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.multiple = true;
      input.style.display = 'block';
      input.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files || []);
        for (const file of files){
          const r = new FileReader();
          r.onload = () => { addPhoto(forFolderId, r.result); render(); save(); };
          r.readAsDataURL(file);
        }
        input.value = '';
      });
      input.click();
      return input;
    }

    function render(){
      grid.innerHTML = '';
      data.folders.forEach(folder => {
        const card = document.createElement('article');
        card.className = 'card';

        // Заголовок папки — кликабельная зона редактирования
        const header = document.createElement('div');
        header.className = 'card-header';
        const title = document.createElement('input');
        title.className = 'folder-name';
        title.value = folder.name;
        title.addEventListener('input', () => folder.name = title.value);
        title.addEventListener('blur', () => save());
        header.appendChild(title);

        const badge = document.createElement('span');
        badge.className = 'badge';
        const notDone = folder.photos.filter(p => !p.done).length;
        badge.textContent = notDone + ' фото';
        header.appendChild(badge);

        // Галерея внутри папки (в Apple-стиле: миниатюры будут видны напрямую)
        const gallery = document.createElement('div');
        gallery.className = 'gallery';
        const visible = folder.photos.filter(p => !p.done);
        visible.forEach((p, idx) => {
          const img = document.createElement('img');
          img.className = 'thumb';
          img.src = p.src;
          img.alt = 'Фото';
          img.addEventListener('click', () => openLightbox(folder.id, folder.photos.findIndex(x => x.id === p.id)));
          gallery.appendChild(img);
        });

        // выполненные
        if (folder.photos.filter(p => p.done).length > 0){
          const doneSection = document.createElement('details');
          const summary = document.createElement('summary');
          summary.textContent = 'Показать выполненные (' + folder.photos.filter(p => p.done).length + ')';
          doneSection.appendChild(summary);
          const dGallery = document.createElement('div');
          dGallery.className = 'gallery';
          folder.photos.filter(p => p.done).forEach(p => {
            const dImg = document.createElement('img');
            dImg.className = 'thumb';
            dImg.src = p.src;
            dImg.alt = 'Выполнено';
            dGallery.appendChild(dImg);
          });
          doneSection.appendChild(dGallery);
          gallery.appendChild(doneSection);
        }

        // действия папки
        const actions = document.createElement('div');
        actions.className = 'toolbar';
        actions.style.display = 'flex'; actions.style.gap = '8px'; actions.style.flexWrap = 'wrap';
        const addBtn = document.createElement('button');
        addBtn.className = 'btn';
        addBtn.textContent = 'Добавить фото';
        addBtn.style.flex = '1 1 auto';
        addBtn.addEventListener('click', () => createFileInput(folder.id));

        const renameBtn = document.createElement('button');
        renameBtn.className = 'btn secondary';
        renameBtn.textContent = 'Переименовать';
        renameBtn.style.flex = '1 1 auto';
        renameBtn.addEventListener('click', () => {
          const proposed = prompt('Новое название папки:', folder.name);
          if (proposed && proposed.trim()) {
            folder.name = proposed.trim();
            render(); save();
          }
        });

        const delFolder = document.createElement('button');
        delFolder.className = 'btn secondary';
        delFolder.textContent = 'Удалить папку';
        delFolder.style.flex = '1 1 auto';
        delFolder.addEventListener('click', () => {
          if (confirm('Удалить папку и все фотографии в ней?')) {
            data.folders = data.folders.filter(f => f.id !== folder.id);
            render(); save();
          }
        });

        // перемещение последней фото в другую папку (пример)
        const moveFolderSelector = document.createElement('select');
        moveFolderSelector.className = 'select';
        moveFolderSelector.style.flex = '1 1 auto';
        moveFolderSelector.innerHTML = `<option value="">Переместить в...</option>` +
          data.folders.filter(f => f.id !== folder.id).map(f => `<option value="${f.id}">${f.name}</option>`).join('');
        moveFolderSelector.addEventListener('change', (e) => {
          const targetId = e.target.value;
          if (targetId) {
            if (folder.photos.length > 0) {
              const photoId = folder.photos[folder.photos.length - 1].id;
              movePhoto(photoId, folder.id, targetId);
              render(); save();
            }
            e.target.value = '';
          }
        });

        actions.appendChild(addBtn);
        actions.appendChild(renameBtn);
        actions.appendChild(delFolder);
        actions.appendChild(moveFolderSelector);

        card.appendChild(header);
        card.appendChild(gallery);
        card.appendChild(actions);

        grid.appendChild(card);
      });
    }

    // Инициализация
    load();
    if (data.folders.length === 0){
      data.folders = [
        { id: 'f1', name: 'Лето', created: Date.now(), photos: [] },
        { id: 'f2', name: 'Зима', created: Date.now(), photos: [] },
        { id: 'f3', name: 'Весна', created: Date.now(), photos: [] },
        { id: 'f4', name: 'Осень', created: Date.now(), photos: [] }
      ];
    }
    render();
    btnAddFolder.addEventListener('click', () => {
      const name = (newFolderName.value || '').trim();
      if (!name) return;
      addFolder(name);
      newFolderName.value = '';
      render(); save();
    });

    // Lightbox навигация
    lbPrev.addEventListener('click', showPrev);
    lbNext.addEventListener('click', showNext);
    lb.addEventListener('click', (e) => { if (e.target === lb) closeLightbox(); });

    window.addEventListener('beforeunload', save);
  </script>
</body>
</html>
