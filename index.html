<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Образы по сезонам — полная версия</title>
  <style>
    :root{
      --bg: #0f1115;
      --card: #171a22;
      --text: #e9e9ea;
      --muted: #b5bbcf;
      --accent: #7aa2f7;
      --border: rgba(255,255,255,.08);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial; background: var(--bg); color: var(--text); }

    header {
      padding: 14px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    header h1 { margin: 0 0 6px; font-size: 1.2rem; }
    header p { margin: 0; color: var(--muted); font-size: 0.92rem; }

    .container { padding: 8px 12px 20px; max-width: 100%; }

    .topbar {
      display: grid; gap: 8px;
      grid-template-columns: 1fr;
      margin-bottom: 8px;
    }
    .row { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
    .input, .select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #1e2030;
      color: var(--text);
    }
    .btn {
      background: var(--accent);
      color: #0b0e1a;
      border: none; padding: 12px;
      border-radius: 8px; cursor: pointer;
      font-weight: 600;
      width: 100%;
    }
    .btn.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .season-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    }

    .card {
      background: linear-gradient(135deg, rgba(23,26,34,.95), rgba(22,26,38,.95));
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card-header {
      padding: 12px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,.05);
      flex-wrap: wrap;
      gap: 8px;
    }
    .card-header h3 { margin: 0; font-size: 1rem; cursor: pointer; display: flex; align-items: center; gap: 5px; }
    .badge { font-size: 0.75rem; padding: 4px 8px; border-radius: 999px; background: #2b324e; color: #fff; }

    .gallery {
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(86px, 1fr));
      gap: 6px;
      align-items: center;
    }
    .thumb { width: 100%; height: 86px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); background:#111; cursor: pointer; }
    .thumb-done { opacity: 0.5; }

    .folder-veil { padding: 8px; display: grid; grid-template-columns: 1fr; gap: 6px; }

    .lightbox {
      position: fixed; inset: 0; background: rgba(0,0,0,.8);
      display: none; align-items: center; justify-content: center;
      padding: 12px;
      z-index: 1000;
    }
    .lightbox.open { display: flex; }
    .lightbox-content {
      max-width: 90vw; max-height: 80vh; position: relative;
    }
    .lightbox-content img { width: 100%; height: auto; border-radius: 8px; display: block; }
    .nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid var(--border); background: rgba(255,255,255,.1);
      color: white; display: grid; place-items: center; cursor: pointer;
    }
    .nav.prev { left: -60px; }
    .nav.next { right: -60px; }

    @media (max-width: 600px){
      .season-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
      .thumb { height: 76px; }
    }

    .card-actions {
      padding: 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      border-top: 1px solid var(--border);
    }
    .small-btn {
      padding: 6px 10px;
      font-size: 0.7rem;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
    }
    .photo-controls {
      display: flex;
      gap: 4px;
      justify-content: center;
      padding: 4px;
      flex-wrap: wrap;
    }
    .photo-controls button {
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 0.7rem;
      cursor: pointer;
    }
    .star.active { color: #ffd966; }
    .done { opacity: 0.5; }
    details summary {
      cursor: pointer;
      padding: 6px;
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header>
    <h1>Мои образы по сезонам</h1>
    <p>Папки ★ важность 📦 архив ✨ перетаскивание порядка</p>
  </header>

  <main class="container">
    <section class="topbar" aria-label="Управление папками">
      <div class="row" style="gap:8px;">
        <input id="newFolderName" class="input" placeholder="Название новой папки (например, Лето 2025)">
      </div>
      <div class="row" style="margin-top:6px;">
        <button id="btnAddFolder" class="btn" type="button">➕ Добавить папку</button>
      </div>
    </section>

    <section aria-labelledby="season-label" class="season-section">
      <h2 id="season-label" style="font-size:1rem; margin:0 0 8px;">📁 Папки</h2>
      <div id="season-grid" class="season-grid"></div>
    </section>
  </main>

  <div id="lightbox" class="lightbox" role="dialog" aria-label="Просмотр фото">
    <button class="nav prev" id="lbPrev" aria-label="Предыдущее">◀</button>
    <div class="lightbox-content">
      <img id="lbImg" src="" alt="Фото">
    </div>
    <button class="nav next" id="lbNext" aria-label="Следующее">▶</button>
  </div>

  <script>
    const STORAGE_KEY = 'fashion_albums_final';
    let data = { folders: [] };
    const grid = document.getElementById('season-grid');
    const newFolderName = document.getElementById('newFolderName');
    const btnAddFolder = document.getElementById('btnAddFolder');
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    const lbPrev = document.getElementById('lbPrev');
    const lbNext = document.getElementById('lbNext');
    let currentLightbox = { folderId: null, photoId: null };

    function uid(){ return 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2,9); }

    function load(){ 
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) data = JSON.parse(raw);
      } catch(e){ console.warn(e); } 
    }
    function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

    // --- работа с папками ---
    function addFolder(name){
      if (!name.trim()) return;
      if (data.folders.some(f => f.name.toLowerCase() === name.toLowerCase().trim())) {
        alert('Папка с таким названием уже есть');
        return;
      }
      data.folders.push({ id: uid(), name: name.trim(), created: Date.now(), photos: [] });
      save();
      render();
    }

    function renameFolder(folderId, newName){
      const f = data.folders.find(x => x.id === folderId);
      if(f && newName.trim()) {
        f.name = newName.trim();
        save();
        render();
      }
    }

    function deleteFolder(folderId){
      if(data.folders.length <= 1){
        alert('Нельзя удалить последнюю папку');
        return;
      }
      if(confirm('Удалить папку и все фото?')){
        data.folders = data.folders.filter(f => f.id !== folderId);
        save();
        render();
      }
    }

    // --- работа с фото ---
    function addPhoto(folderId, dataURL){
      const f = data.folders.find(x => x.id === folderId);
      if(!f) return;
      f.photos.push({ 
        id: uid(), 
        src: dataURL, 
        date: Date.now(), 
        done: false, 
        important: false 
      });
      sortPhotos(f);
      save();
      render();
    }

    function sortPhotos(folder){
      folder.photos.sort((a,b) => {
        if(a.done !== b.done) return a.done ? 1 : -1;
        if(a.important !== b.important) return a.important ? -1 : 1;
        return b.date - a.date;
      });
    }

    function deletePhoto(folderId, photoId){
      if(confirm('Удалить фото?')){
        const f = data.folders.find(x => x.id === folderId);
        if(f) f.photos = f.photos.filter(p => p.id !== photoId);
        save();
        render();
      }
    }

    function toggleImportant(folderId, photoId){
      const f = data.folders.find(x => x.id === folderId);
      const p = f?.photos.find(x => x.id === photoId);
      if(p) {
        p.important = !p.important;
        sortPhotos(f);
        save();
        render();
      }
    }

    function toggleDone(folderId, photoId){
      const f = data.folders.find(x => x.id === folderId);
      const p = f?.photos.find(x => x.id === photoId);
      if(p) {
        p.done = !p.done;
        sortPhotos(f);
        save();
        render();
      }
    }

    function movePhotoToFolder(photoId, fromFolderId, toFolderId){
      const from = data.folders.find(f => f.id === fromFolderId);
      const to = data.folders.find(f => f.id === toFolderId);
      if(!from || !to) return;
      const idx = from.photos.findIndex(p => p.id === photoId);
      if(idx === -1) return;
      const [photo] = from.photos.splice(idx, 1);
      to.photos.push(photo);
      sortPhotos(from);
      sortPhotos(to);
      save();
      render();
    }

    function movePhotoOrder(folderId, photoId, direction){
      const f = data.folders.find(x => x.id === folderId);
      if(!f) return;
      const idx = f.photos.findIndex(p => p.id === photoId);
      if(idx === -1) return;
      const newIdx = direction === 'up' ? idx - 1 : idx + 1;
      if(newIdx < 0 || newIdx >= f.photos.length) return;
      [f.photos[idx], f.photos[newIdx]] = [f.photos[newIdx], f.photos[idx]];
      save();
      render();
    }

    // --- загрузка фото ---
    function createFileInput(forFolderId){
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.multiple = true;
      input.addEventListener('change', (e) => {
        const files = Array.from(e.target.files || []);
        files.forEach(file => {
          const reader = new FileReader();
          reader.onload = (ev) => { addPhoto(forFolderId, ev.target.result); };
          reader.readAsDataURL(file);
        });
        input.remove();
      });
      input.click();
    }

    // --- лайтбокс ---
    function openLightbox(folderId, photoId){
      const f = data.folders.find(x => x.id === folderId);
      if(!f) return;
      const idx = f.photos.findIndex(p => p.id === photoId);
      if(idx === -1) return;
      currentLightbox = { folderId, photoId };
      lbImg.src = f.photos[idx].src;
      lb.classList.add('open');
    }

    function closeLightbox(){ lb.classList.remove('open'); }
    
    function navigateLightbox(delta){
      const f = data.folders.find(x => x.id === currentLightbox.folderId);
      if(!f || f.photos.length === 0) return;
      const currentIdx = f.photos.findIndex(p => p.id === currentLightbox.photoId);
      let newIdx = currentIdx + delta;
      if(newIdx < 0) newIdx = f.photos.length - 1;
      if(newIdx >= f.photos.length) newIdx = 0;
      const newPhoto = f.photos[newIdx];
      currentLightbox.photoId = newPhoto.id;
      lbImg.src = newPhoto.src;
    }

    // --- рендер ---
    function render(){
      grid.innerHTML = '';
      data.folders.forEach(folder => {
        const activePhotos = folder.photos.filter(p => !p.done);
        const archivedPhotos = folder.photos.filter(p => p.done);
        
        const card = document.createElement('section');
        card.className = 'card';

        const header = document.createElement('div');
        header.className = 'card-header';
        
        const titleSpan = document.createElement('h3');
        titleSpan.innerHTML = `📁 ${escapeHtml(folder.name)} ✏️`;
        titleSpan.style.cursor = 'pointer';
        titleSpan.onclick = () => {
          const newName = prompt('Новое название папки:', folder.name);
          if(newName && newName.trim()) renameFolder(folder.id, newName.trim());
        };
        header.appendChild(titleSpan);

        const badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = `⭐ ${activePhotos.filter(p => p.important).length} важных · 📷 ${activePhotos.length}`;
        header.appendChild(badge);

        // галерея активных фото
        const gallery = document.createElement('div');
        gallery.className = 'gallery';
        
        activePhotos.forEach(photo => {
          const wrapper = document.createElement('div');
          wrapper.style.position = 'relative';
          
          const img = document.createElement('img');
          img.className = 'thumb';
          img.src = photo.src;
          img.alt = 'Фото';
          img.onclick = () => openLightbox(folder.id, photo.id);
          
          const controls = document.createElement('div');
          controls.className = 'photo-controls';
          controls.innerHTML = `
            <button class="${photo.important ? 'star active' : 'star'}" data-action="important">⭐</button>
            <button data-action="archive">📦</button>
            <button data-action="up">⬆️</button>
            <button data-action="down">⬇️</button>
            <button data-action="move">↗️</button>
            <button data-action="delete">🗑</button>
          `;
          
          controls.querySelector('[data-action="important"]').onclick = (e) => {
            e.stopPropagation();
            toggleImportant(folder.id, photo.id);
          };
          controls.querySelector('[data-action="archive"]').onclick = (e) => {
            e.stopPropagation();
            toggleDone(folder.id, photo.id);
          };
          controls.querySelector('[data-action="up"]').onclick = (e) => {
            e.stopPropagation();
            movePhotoOrder(folder.id, photo.id, 'up');
          };
          controls.querySelector('[data-action="down"]').onclick = (e) => {
            e.stopPropagation();
            movePhotoOrder(folder.id, photo.id, 'down');
          };
          controls.querySelector('[data-action="move"]').onclick = (e) => {
            e.stopPropagation();
            const targetName = prompt('Переместить в папку:\n' + data.folders.filter(f => f.id !== folder.id).map(f => f.name).join('\n'));
            const targetFolder = data.folders.find(f => f.name === targetName);
            if(targetFolder) movePhotoToFolder(photo.id, folder.id, targetFolder.id);
            else alert('Папка не найдена');
          };
          controls.querySelector('[data-action="delete"]').onclick = (e) => {
            e.stopPropagation();
            deletePhoto(folder.id, photo.id);
          };
          
          wrapper.appendChild(img);
          wrapper.appendChild(controls);
          gallery.appendChild(wrapper);
        });

        // кнопка добавить фото
        const addBtn = document.createElement('button');
        addBtn.className = 'btn';
        addBtn.textContent = '➕ Добавить фото';
        addBtn.onclick = () => createFileInput(folder.id);

        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'card-actions';
        
        const delFolderBtn = document.createElement('button');
        delFolderBtn.className = 'small-btn';
        delFolderBtn.textContent = '🗑 Удалить папку';
        delFolderBtn.onclick = () => deleteFolder(folder.id);
        
        actionsDiv.appendChild(delFolderBtn);
        
        // выпадающий список для перемещения фото
        const moveSelect = document.createElement('select');
        moveSelect.className = 'small-btn';
        moveSelect.style.background = '#1e2030';
        moveSelect.innerHTML = '<option value="">📁 Переместить фото...</option>' + 
          data.folders.filter(f => f.id !== folder.id).map(f => `<option value="${f.id}">${f.name}</option>`).join('');
        moveSelect.onchange = (e) => {
          if(e.target.value && activePhotos.length > 0){
            const photoToMove = activePhotos[0];
            movePhotoToFolder(photoToMove.id, folder.id, e.target.value);
            e.target.value = '';
          }
        };
        actionsDiv.appendChild(moveSelect);
        
        card.appendChild(header);
        card.appendChild(gallery);
        card.appendChild(addBtn);
        card.appendChild(actionsDiv);
        
        // архив (выполненные)
        if(archivedPhotos.length > 0){
          const details = document.createElement('details');
          const summary = document.createElement('summary');
          summary.textContent = `📦 Архив (${archivedPhotos.length} выполненных)`;
          details.appendChild(summary);
          const archiveGallery = document.createElement('div');
          archiveGallery.className = 'gallery';
          archivedPhotos.forEach(photo => {
            const wrapper = document.createElement('div');
            const img = document.createElement('img');
            img.className = 'thumb thumb-done';
            img.src = photo.src;
            img.onclick = () => openLightbox(folder.id, photo.id);
            const restoreBtn = document.createElement('button');
            restoreBtn.className = 'small-btn';
            restoreBtn.textContent = '↩️ Вернуть';
            restoreBtn.onclick = () => toggleDone(folder.id, photo.id);
            wrapper.appendChild(img);
            wrapper.appendChild(restoreBtn);
            archiveGallery.appendChild(wrapper);
          });
          details.appendChild(archiveGallery);
          card.appendChild(details);
        }
        
        grid.appendChild(card);
      });
    }

    function escapeHtml(str){
      if(!str) return '';
      return str.replace(/[&<>]/g, function(m){
        if(m === '&') return '&amp;';
        if(m === '<') return '&lt;';
        if(m === '>') return '&gt;';
        return m;
      });
    }

    // --- инициализация ---
    load();
    if(data.folders.length === 0){
      data.folders = [
        { id: uid(), name: '☀️ Лето', created: Date.now(), photos: [] },
        { id: uid(), name: '❄️ Зима', created: Date.now(), photos: [] },
        { id: uid(), name: '🌸 Весна', created: Date.now(), photos: [] },
        { id: uid(), name: '🍂 Осень', created: Date.now(), photos: [] }
      ];
      save();
    }
    render();

    btnAddFolder.addEventListener('click', () => {
      const name = newFolderName.value.trim();
      if(name) addFolder(name);
      newFolderName.value = '';
    });

    lbPrev.addEventListener('click', () => navigateLightbox(-1));
    lbNext.addEventListener('click', () => navigateLightbox(1));
    lb.addEventListener('click', (e) => { if(e.target === lb) closeLightbox(); });
  </script>
</body>
</html>
