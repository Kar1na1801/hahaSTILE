<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Мой стиль по сезонам — управляемые папки</title>
  <style>
    :root{
      --bg: #0f1115;
      --card: #171a22;
      --text: #e9e9ea;
      --muted: #b5bbcf;
      --accent: #7aa2f7;
      --border: rgba(255,255,255,.08);
      --done: #2e3a2f;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial; background: var(--bg); color: var(--text); }

    header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    header h1 { margin: 0 0 6px; font-size: 1.6rem; }
    header p { margin: 0; color: var(--muted); }

    .container { max-width: 1100px; margin: 24px auto; padding: 0 16px; }

    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; justify-content: space-between; margin-bottom: 12px; }

    .input, .select {
      background: #1e2030;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
    }

    .season-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: linear-gradient(135deg, rgba(20,22,34,.95), rgba(18,22,38,.95));
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 240px;
    }
    .card-header {
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,.05);
    }
    .card-header h3 { margin: 0; font-size: 1rem; }
    .badge { font-size: 0.75rem; padding: 4px 8px; border-radius: 999px; background: #2b324e; color: #fff; }

    .gallery { padding: 12px; display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 8px; }
    .gallery .thumb { width: 100%; height: 72px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); background:#111; }

    .card-body { padding: 0 14px 12px; display: none; } /* прячем содержимое по умолчанию, можно развёрнуть по кнопке "Показать" */

    .card-actions { padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); background: rgba(0,0,0,.04); }
    .btn { background: var(--accent); color: #0b0e1a; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .btn.secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .row { display: flex; gap: 6px; align-items: center; }

    .section-title { margin: 0 0 8px; font-size: 1.05rem; }

    details[open] .card-body { display: block; }

    /* простая кнопка добавления новой папки */
    .new-folder { display: flex; gap: 8px; align-items: center; }

    @media (max-width: 600px){
      .gallery .thumb { height: 60px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Мой стиль по сезонам с папками</h1>
    <p>Добавляйте свои папки, загружайте фото, сортируйте по дате, помечайте выполненные и управляйте порядком.</p>
  </header>

  <main class="container">
    <section aria-labelledby="controls-title" class="controls">
      <h2 id="controls-title" class="section-title" style="display:none;">Управление</h2>
      <div class="toolbar" aria-label="Панель управления">
        <div class="row">
          <input id="newFolderName" class="input" placeholder="Название новой папки" />
          <button id="btnAddFolder" class="btn" type="button">Добавить папку</button>
        </div>
        <button id="btnExport" class="btn secondary" type="button">Экспорт/Импорт</button>
      </div>
    </section>

    <section aria-labelledby="season-label" class="season-section">
      <h2 id="season-label" style="font-size:1.1rem; margin:0 0 12px;">Папки и фото</h2>

      <div id="season-grid" class="season-grid"></div>
    </section>

  </main>

  <script>
    // Структура данных:
    // data = {
    //   folders: [
    //     {
    //       id: 'f1', name: 'Лето', created: timestamp,
    //       photos: [
    //         { id:'p1', src:'url', date: timestamp, done:false, important: 0, note: '' }
    //       ]
    //     }, ...
    //   ]
    // }

    const STORAGE_KEY = 'fashion_albums_v1';
    let data = { folders: [] };

    // Поддержка id генератора
    const uid = () => 'id-' + Math.random().toString(36).slice(2,9);

    // Сохранение и загрузка
    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) data = JSON.parse(raw);
      } catch (e) { console.warn('Не удалось загрузить данные', e); }
    }
    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // Текущие представления
    const grid = document.getElementById('season-grid');
    const newFolderInput = document.getElementById('newFolderName');
    document.getElementById('btnAddFolder').addEventListener('click', () => {
      const name = newFolderInput.value.trim();
      if (!name) return;
      addFolder(name);
      newFolderInput.value = '';
      render();
      save();
    });

    // Добавление папки
    function addFolder(name) {
      data.folders.push({
        id: uid(),
        name,
        created: Date.now(),
        photos: []
      });
    }

    // Простейшая загрузка файлов (через input[type=file] внутри карточки)
    function createFileInput(forFolderId) {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.multiple = true;
      input.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files || []);
        for (const file of files) {
          const reader = new FileReader();
          reader.onload = () => {
            addPhoto(forFolderId, reader.result);
            render();
            save();
          };
          reader.readAsDataURL(file);
        }
        // сбросим значение чтобы можно было выбрать заново
        input.value = '';
      });
      // нажмите на кнопку, чтобы открыть файл-диалог
      return input;
    }

    // Добавление фото в папку (dataURL)
    function addPhoto(folderId, dataURL) {
      const folder = data.find(f => f.id === folderId);
      if (!folder) return;
      folder.photos.push({
        id: uid(),
        src: dataURL,
        date: Date.now(),
        done: false,
        important: 0
      });
      // сортировка по дате добавления (возраста)
      folder.photos.sort((a,b) => a.date - b.date);
    }

    // Удаление фото
    function deletePhoto(folderId, photoId) {
      const f = data.folders.find(x => x.id === folderId);
      if (!f) return;
      f.photos = f.photos.filter(p => p.id !== photoId);
    }

    // Перемещение фото между папками
    function movePhoto(photoId, fromFolderId, toFolderId) {
      const from = data.folders.find(f => f.id === fromFolderId);
      const to = data.folders.find(f => f.id === toFolderId);
      if (!from || !to) return;
      const idx = from.photos.findIndex(p => p.id === photoId);
      if (idx < 0) return;
      const [ph] = from.photos.splice(idx, 1);
      // добавляем в конец новой папки
      to.photos.push(ph);
      // пересортируем
      to.photos.sort((a,b) => a.date - b.date);
    }

    // Изменение порядка по важности (механизм прост: 'move up/down' по индексу)
    function reorderPhoto(folderId, photoId, direction) {
      const f = data.folders.find(x => x.id === folderId);
      if (!f) return;
      const idx = f.photos.findIndex(p => p.id === photoId);
      if (idx < 0) return;
      const newIdx = direction === 'up' ? idx - 1 : idx + 1;
      if (newIdx < 0 || newIdx >= f.photos.length) return;
      // обмен местами
      const tmp = f.photos[idx];
      f.photos[idx] = f.photos[newIdx];
      f.photos[newIdx] = tmp;
    }

    // отмечать как выполненное
    function toggleDone(folderId, photoId) {
      const f = data.folders.find(x => x.id === folderId);
      if (!f) return;
      const p = f.photos.find(x => x.id === photoId);
      if (!p) return;
      p.done = !p.done;
      // порядок: выполненные скрывать вниз
      f.photos.sort((a,b) => Number(a.done) - Number(b.done) || a.date - b.date);
    }

    // Рендер
    function render() {
      grid.innerHTML = '';
      data.folders.forEach(folder => {
        // детали папки
        const card = document.createElement('section');
        card.className = 'card';
        // header
        const header = document.createElement('div');
        header.className = 'card-header';
        const title = document.createElement('h3');
        title.textContent = folder.name;
        const badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = folder.photos.filter(p => !p.done).length + ' фото';
        header.appendChild(title);
        header.appendChild(badge);

        // тело галереи
        const body = document.createElement('div');
        body.className = 'card-body';

        // Галерея
        const gallery = document.createElement('div');
        gallery.className = 'gallery';
        // фотографии, сначала невыполненные, затем выполненные спрятать (по умолчанию скроем выпол. через collapsible)
        const visiblePhotos = folder.photos.filter(p => !p.done);
        const hiddenPhotos = folder.photos.filter(p => p.done);

        // показать невыполненные
        visiblePhotos.forEach(p => {
          const img = document.createElement('img');
          img.className = 'thumb';
          img.src = p.src;
          img.alt = 'Фото';
          // контекстное меню действий
          const wrap = document.createElement('div');
          wrap.style.position = 'relative';
          wrap.appendChild(img);

          // кнопки управления на фото
          const actions = document.createElement('div');
          actions.style.position = 'absolute';
          actions.style.bottom = '6px';
          actions.style.left = '6px';
          actions.style.right = '6px';
          actions.style.display = 'flex';
          actions.style.gap = '6px';
          actions.style.opacity = '0.95';
          const up = document.createElement('button');
          up.textContent = '↑';
          up.className = 'btn secondary';
          up.style.padding = '4px 6px';
          up.addEventListener('click', () => reorderPhoto(folder.id, p.id, 'up'));
          const down = document.createElement('button');
          down.textContent = '↓';
          down.className = 'btn secondary';
          down.style.padding = '4px 6px';
          down.addEventListener('click', () => reorderPhoto(folder.id, p.id, 'down'));
          const doneBtn = document.createElement('button');
          doneBtn.textContent = p.done ? 'Вып.' : 'Выполнить';
          doneBtn.className = 'btn secondary';
          doneBtn.style.padding = '4px 6px';
          doneBtn.addEventListener('click', () => toggleDone(folder.id, p.id));
          const del = document.createElement('button');
          del.textContent = 'Удалить';
          del.className = 'btn secondary';
          del.style.padding = '4px 6px';
          del.addEventListener('click', () => { deletePhoto(folder.id, p.id); render(); save(); });

          actions.appendChild(up); actions.appendChild(down); actions.appendChild(doneBtn); actions.appendChild(del);
          wrap.appendChild(actions);
          gallery.appendChild(wrap);
        });

        // разворачиваем скрытое (выполненные) по кнопке
        if (hiddenPhotos.length > 0) {
          const details = document.createElement('details');
          const summary = document.createElement('summary');
          summary.textContent = 'Показать выполненные (' + hiddenPhotos.length + ')';
          details.appendChild(summary);
          const hiddenGrid = document.createElement('div');
          hiddenGrid.className = 'gallery';
          hiddenPhotos.forEach(p => {
            const img = document.createElement('img');
            img.className = 'thumb';
            img.src = p.src;
            img.alt = 'Выполнено';
            // на фото можно сделать аналогичные кнопки, но они скрыты под details
            hiddenGrid.appendChild(img);
          });
          details.appendChild(hiddenGrid);
          body.appendChild(details);
        }

        // кнопки добавления
        const actions = document.createElement('div');
        actions.className = 'card-actions';
        const addBtn = document.createElement('button');
        addBtn.className = 'btn';
        addBtn.textContent = 'Добавить фото';
        addBtn.addEventListener('click', () => {
          // временно добавим скрытый input для загрузки
          const input = createFileInput(folder.id);
          // вставим рядом кнопку-обертку
          const holder = document.createElement('div');
          holder.style.display = 'inline-block';
          holder.style.marginLeft = '4px';
          holder.appendChild(input);
          actions.replaceWith(holder);
        });

        const moveFolderSelector = document.createElement('select');
        moveFolderSelector.className = 'select';
        moveFolderSelector.innerHTML = `<option value="">Переместить в...</option>` + data.folders.filter(f => f.id !== folder.id).map(f => `<option value="${f.id}">${f.name}</option>`).join('');
        moveFolderSelector.addEventListener('change', (e) => {
          const targetId = e.target.value;
          if (targetId) {
            // перенос первой фото (для примера) в целевую папку
            if (folder.photos.length > 0) {
              const photoId = folder.photos[0].id;
              movePhoto(photoId, folder.id, targetId);
              render();
              save();
            }
            e.target.value = '';
          }
        });

        actions.appendChild(addBtn);
        actions.appendChild(moveFolderSelector);
        header.appendChild(document.createElement('span')); // placeholder для ровного распределения
        card.appendChild(header);
        card.appendChild(gallery);
        card.appendChild(actions);

        grid.appendChild(card);
      });
    }

    // Инициализация данных и рендер
    load();
    // если пусто - создадим примерную папку
    if (data.folders.length === 0) {
      data.folders = [
        { id: uid(), name: 'Лето', created: Date.now(), photos: [] },
        { id: uid(), name: 'Зима', created: Date.now(), photos: [] },
        { id: uid(), name: 'Весна', created: Date.now(), photos: [] },
        { id: uid(), name: 'Осень', created: Date.now(), photos: [] }
      ];
    }
    render();

    // автосохранение перед закрытием и по мере изменений
    window.addEventListener('beforeunload', save);
  </script>
</body>
</html>
