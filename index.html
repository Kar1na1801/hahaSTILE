<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Гардероб-органайзер</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #0f1115;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      color: #e9e9ea;
      padding: 16px 12px 32px;
    }

    .container {
      max-width: 550px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      background: linear-gradient(135deg, #e0e0ff, #b0aaff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    /* Папки */
    .folders-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .folders-title {
      font-size: 1rem;
      font-weight: 500;
      color: #b5bbcf;
    }

    .create-folder-btn {
      background: #2a2e3c;
      border: none;
      padding: 6px 14px;
      border-radius: 30px;
      color: #7aa2f7;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .folders-list {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 12px;
      margin-bottom: 20px;
      scrollbar-width: thin;
    }

    .folder-tab {
      background: #1a1e2a;
      padding: 10px 18px;
      border-radius: 40px;
      font-size: 0.85rem;
      white-space: nowrap;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .folder-tab.active {
      background: #7aa2f7;
      color: #0b0e1a;
    }

    .folder-tab .rename-folder {
      background: none;
      border: none;
      font-size: 0.7rem;
      cursor: pointer;
      opacity: 0.6;
    }

    .delete-folder {
      background: none;
      border: none;
      color: #ff8a8a;
      font-size: 0.8rem;
      cursor: pointer;
    }

    /* Основная карточка папки */
    .folder-content {
      background: linear-gradient(135deg, rgba(20,22,34,0.95), rgba(18,22,38,0.95));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .folder-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .current-folder-name {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .add-photo-btn {
      background: #7aa2f7;
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.8rem;
      color: #0b0e1a;
      cursor: pointer;
    }

    /* Галерея */
    .photos-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .photo-card {
      background: #1a1e2a;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
    }

    .photo-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
    }

    .photo-actions {
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .photo-buttons {
      display: flex;
      gap: 8px;
    }

    .photo-btn {
      background: none;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px;
    }

    .star-btn.active {
      color: #ffd966;
    }

    .archive-btn {
      color: #7aa2f7;
    }

    .delete-photo-btn {
      color: #ff8a8a;
    }

    .move-folder-btn {
      color: #b5bbcf;
      font-size: 0.7rem;
      background: rgba(255,255,255,0.1);
      padding: 4px 8px;
      border-radius: 20px;
    }

    /* Архив */
    .archive-section {
      margin-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 12px;
    }

    .archive-header {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 8px 0;
    }

    .archive-icon {
      font-size: 1rem;
      transition: transform 0.2s;
    }

    .archive-header.open .archive-icon {
      transform: rotate(90deg);
    }

    .archive-grid {
      display: none;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 12px;
    }

    .archive-grid.open {
      display: grid;
    }

    /* Модалка для переноса */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #1a1e2a;
      border-radius: 24px;
      padding: 20px;
      width: 280px;
    }

    .modal-content h4 {
      margin-bottom: 12px;
    }

    .modal-folder-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .modal-folder-item {
      padding: 10px;
      background: #0f1115;
      border-radius: 12px;
      cursor: pointer;
    }

    .modal-close {
      background: #7aa2f7;
      border: none;
      padding: 8px;
      border-radius: 30px;
      width: 100%;
      cursor: pointer;
    }

    /* Перетаскивание */
    .photo-card.dragging {
      opacity: 0.5;
    }

    .photo-card.drag-over {
      border: 2px solid #7aa2f7;
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>🎭 Гардероб-органайзер</h1>
  </header>

  <div class="folders-header">
    <span class="folders-title">📁 Мои папки</span>
    <button class="create-folder-btn" id="createFolderBtn">+ Новая папка</button>
  </div>

  <div class="folders-list" id="foldersList"></div>

  <div class="folder-content" id="folderContent">
    <div class="folder-header">
      <span class="current-folder-name" id="currentFolderName"></span>
      <button class="add-photo-btn" id="addPhotoBtn">📷 Добавить фото</button>
    </div>

    <div id="activePhotosGrid" class="photos-grid"></div>

    <div class="archive-section" id="archiveSection">
      <div class="archive-header" id="archiveHeader">
        <span class="archive-icon">▶</span>
        <span>📦 Выполненные / Архив</span>
        <span id="archiveCount" style="font-size:0.7rem; color:#888;"></span>
      </div>
      <div class="archive-grid" id="archiveGrid"></div>
    </div>
  </div>
</div>

<div id="moveModal" class="modal">
  <div class="modal-content">
    <h4>Переместить в папку:</h4>
    <div id="moveFolderList" class="modal-folder-list"></div>
    <button class="modal-close" id="closeModalBtn">Отмена</button>
  </div>
</div>

<script>
  // ========== ХРАНИЛИЩЕ ==========
  let folders = {}; // { folderId: { name, photos: [{ id, url, date, starred, archived, order }] } }
  let folderOrder = []; // порядок папок
  let currentFolderId = null;
  let pendingMovePhotoId = null;
  let pendingMoveFromFolder = null;
  let dragSourcePhoto = null;

  const STORAGE_KEY = 'wardrobe_organizer_v2';

  // Загрузка
  function loadData() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        const data = JSON.parse(saved);
        folders = data.folders || {};
        folderOrder = data.folderOrder || [];
        if (folderOrder.length === 0) {
          // Папка по умолчанию
          const defaultId = 'folder_' + Date.now();
          folders[defaultId] = { name: 'Мой гардероб', photos: [] };
          folderOrder = [defaultId];
        }
      } catch(e) { initDefault(); }
    } else {
      initDefault();
    }
    if (!currentFolderId && folderOrder.length) currentFolderId = folderOrder[0];
    renderAll();
  }

  function initDefault() {
    const defaultId = 'folder_' + Date.now();
    folders = { [defaultId]: { name: 'Мой гардероб', photos: [] } };
    folderOrder = [defaultId];
  }

  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ folders, folderOrder }));
  }

  // Генерация ID
  function genId() {
    return Date.now() + '-' + Math.random().toString(36).substr(2, 8);
  }

  // Добавление фото
  function addPhotos(files) {
    if (!files || !files.length || !currentFolderId) return;
    const fileArray = Array.from(files);
    let loaded = 0;
    fileArray.forEach(file => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const newPhoto = {
          id: genId(),
          url: e.target.result,
          date: Date.now(),
          starred: false,
          archived: false,
          order: Date.now()  // для сортировки по новизне
        };
        folders[currentFolderId].photos.unshift(newPhoto);
        loaded++;
        if (loaded === fileArray.length) {
          reorderPhotos(currentFolderId);
          saveData();
          renderAll();
        }
      };
      reader.onerror = () => {
        loaded++;
        if (loaded === fileArray.length) {
          reorderPhotos(currentFolderId);
          saveData();
          renderAll();
        }
      };
      reader.readAsDataURL(file);
    });
  }

  // Пересортировка: сначала звёздные, потом по дате, потом по ручному порядку
  function reorderPhotos(folderId) {
    const photos = folders[folderId].photos;
    photos.sort((a, b) => {
      if (a.archived !== b.archived) return a.archived ? 1 : -1;
      if (a.starred !== b.starred) return a.starred ? -1 : 1;
      return (b.order || b.date) - (a.order || a.date);
    });
  }

  // Переключение архива
  function toggleArchive(photoId, folderId) {
    const photo = folders[folderId].photos.find(p => p.id == photoId);
    if (photo) {
      photo.archived = !photo.archived;
      reorderPhotos(folderId);
      saveData();
      renderAll();
    }
  }

  // Звезда (важность)
  function toggleStar(photoId, folderId) {
    const photo = folders[folderId].photos.find(p => p.id == photoId);
    if (photo) {
      photo.starred = !photo.starred;
      reorderPhotos(folderId);
      saveData();
      renderAll();
    }
  }

  // Удаление фото
  function deletePhoto(photoId, folderId) {
    folders[folderId].photos = folders[folderId].photos.filter(p => p.id != photoId);
    saveData();
    renderAll();
  }

  // Создание папки
  function createFolder() {
    let name = prompt('Название папки:', 'Новая папка');
    if (!name) name = 'Новая папка';
    const newId = 'folder_' + genId();
    folders[newId] = { name: name, photos: [] };
    folderOrder.push(newId);
    saveData();
    currentFolderId = newId;
    renderAll();
  }

  // Переименование папки
  function renameFolder(folderId) {
    const newName = prompt('Новое название:', folders[folderId].name);
    if (newName && newName.trim()) {
      folders[folderId].name = newName.trim();
      saveData();
      renderAll();
    }
  }

  // Удаление папки
  function deleteFolder(folderId) {
    if (folderOrder.length === 1) {
      alert('Нельзя удалить последнюю папку');
      return;
    }
    if (confirm(`Удалить папку "${folders[folderId].name}" и все фото?`)) {
      delete folders[folderId];
      folderOrder = folderOrder.filter(id => id !== folderId);
      currentFolderId = folderOrder[0];
      saveData();
      renderAll();
    }
  }

  // Перемещение фото
  function movePhoto(photoId, fromFolderId, toFolderId) {
    const photoIndex = folders[fromFolderId].photos.findIndex(p => p.id == photoId);
    if (photoIndex === -1) return;
    const photo = folders[fromFolderId].photos[photoIndex];
    folders[fromFolderId].photos.splice(photoIndex, 1);
    folders[toFolderId].photos.push(photo);
    reorderPhotos(fromFolderId);
    reorderPhotos(toFolderId);
    saveData();
    renderAll();
  }

  // Изменение порядка (перетаскивание)
  function setupDragAndDrop() {
    const photos = document.querySelectorAll('.photo-card');
    photos.forEach(photo => {
      photo.setAttribute('draggable', 'true');
      photo.ondragstart = (e) => {
        dragSourcePhoto = {
          id: photo.getAttribute('data-id'),
          folderId: photo.getAttribute('data-folder')
        };
        e.dataTransfer.setData('text/plain', '');
        photo.classList.add('dragging');
      };
      photo.ondragend = () => {
        photo.classList.remove('dragging');
        dragSourcePhoto = null;
      };
      photo.ondragover = (e) => {
        e.preventDefault();
        photo.classList.add('drag-over');
      };
      photo.ondragleave = () => {
        photo.classList.remove('drag-over');
      };
      photo.ondrop = (e) => {
        e.preventDefault();
        photo.classList.remove('drag-over');
        if (!dragSourcePhoto || dragSourcePhoto.folderId !== currentFolderId) return;
        
        const targetId = photo.getAttribute('data-id');
        if (dragSourcePhoto.id === targetId) return;
        
        const photosArr = folders[currentFolderId].photos;
        const sourceIndex = photosArr.findIndex(p => p.id == dragSourcePhoto.id);
        const targetIndex = photosArr.findIndex(p => p.id == targetId);
        if (sourceIndex !== -1 && targetIndex !== -1) {
          const [moved] = photosArr.splice(sourceIndex, 1);
          photosArr.splice(targetIndex, 0, moved);
          // Обновляем order для сортировки
          photosArr.forEach((p, idx) => { p.order = Date.now() - idx; });
          saveData();
          renderAll();
        }
      };
    });
  }

  // Открытие модалки переноса
  function openMoveModal(photoId, fromFolderId) {
    pendingMovePhotoId = photoId;
    pendingMoveFromFolder = fromFolderId;
    const modal = document.getElementById('moveModal');
    const listDiv = document.getElementById('moveFolderList');
    listDiv.innerHTML = '';
    folderOrder.forEach(fId => {
      if (fId !== fromFolderId) {
        const btn = document.createElement('div');
        btn.className = 'modal-folder-item';
        btn.textContent = folders[fId].name;
        btn.onclick = () => {
          movePhoto(photoId, fromFolderId, fId);
          modal.classList.remove('active');
          pendingMovePhotoId = null;
        };
        listDiv.appendChild(btn);
      }
    });
    if (listDiv.children.length === 0) {
      listDiv.innerHTML = '<div style="padding:10px; text-align:center;">Нет других папок</div>';
    }
    modal.classList.add('active');
  }

  // ========== ОТРИСОВКА ==========
  function renderAll() {
    renderFoldersList();
    renderCurrentFolder();
  }

  function renderFoldersList() {
    const container = document.getElementById('foldersList');
    container.innerHTML = '';
    folderOrder.forEach(fId => {
      const folder = folders[fId];
      const tab = document.createElement('div');
      tab.className = 'folder-tab' + (currentFolderId === fId ? ' active' : '');
      tab.innerHTML = `
        <span>📁 ${folder.name}</span>
        <button class="rename-folder" data-id="${fId}">✏️</button>
        <button class="delete-folder" data-id="${fId}">🗑</button>
      `;
      tab.onclick = (e) => {
        if (e.target.classList.contains('rename-folder')) {
          e.stopPropagation();
          renameFolder(fId);
        } else if (e.target.classList.contains('delete-folder')) {
          e.stopPropagation();
          deleteFolder(fId);
        } else {
          currentFolderId = fId;
          renderAll();
        }
      };
      container.appendChild(tab);
    });
  }

  function renderCurrentFolder() {
    if (!currentFolderId || !folders[currentFolderId]) return;
    const folder = folders[currentFolderId];
    document.getElementById('currentFolderName').innerHTML = `📁 ${folder.name}`;
    
    const activePhotos = folder.photos.filter(p => !p.archived);
    const archivedPhotos = folder.photos.filter(p => p.archived);
    
    // Активные фото
    const activeGrid = document.getElementById('activePhotosGrid');
    activeGrid.innerHTML = '';
    activePhotos.forEach(photo => {
      const card = createPhotoCard(photo, currentFolderId);
      activeGrid.appendChild(card);
    });
    if (activePhotos.length === 0) {
      activeGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:32px; color:#888;">Нет фото. Нажмите "Добавить фото"</div>';
    }
    
    // Архив
    const archiveGrid = document.getElementById('archiveGrid');
    const archiveCountSpan = document.getElementById('archiveCount');
    archiveCountSpan.textContent = `(${archivedPhotos.length})`;
    archiveGrid.innerHTML = '';
    archivedPhotos.forEach(photo => {
      const card = createPhotoCard(photo, currentFolderId);
      archiveGrid.appendChild(card);
    });
    
    // Переключатель архива
    const archiveHeader = document.getElementById('archiveHeader');
    const archiveGridDiv = document.getElementById('archiveGrid');
    const isOpen = archiveHeader.classList.contains('open');
    if (isOpen) {
      archiveGridDiv.classList.add('open');
    } else {
      archiveGridDiv.classList.remove('open');
    }
    
    archiveHeader.onclick = () => {
      archiveHeader.classList.toggle('open');
      if (archiveHeader.classList.contains('open')) {
        archiveGridDiv.classList.add('open');
      } else {
        archiveGridDiv.classList.remove('open');
      }
    };
    
    // Перетаскивание
    setTimeout(setupDragAndDrop, 50);
  }

  function createPhotoCard(photo, folderId) {
    const div = document.createElement('div');
    div.className = 'photo-card';
    div.setAttribute('data-id', photo.id);
    div.setAttribute('data-folder', folderId);
    
    const date = new Date(photo.date);
    const dateStr = `${date.getDate()}.${date.getMonth()+1}`;
    
    div.innerHTML = `
      <img src="${photo.url}" onclick="window.open('${photo.url}', '_blank')">
      <div class="photo-actions">
        <div class="photo-buttons">
          <button class="photo-btn star-btn ${photo.starred ? 'active' : ''}" data-action="star">⭐</button>
          <button class="photo-btn archive-btn" data-action="archive">📦</button>
          <button class="photo-btn delete-photo-btn" data-action="delete">🗑</button>
        </div>
        <button class="move-folder-btn" data-action="move">↗️ Переместить</button>
        <span style="font-size:0.6rem; color:#666;">${dateStr}</span>
      </div>
    `;
    
    div.querySelector('[data-action="star"]').onclick = (e) => {
      e.stopPropagation();
      toggleStar(photo.id, folderId);
    };
    div.querySelector('[data-action="archive"]').onclick = (e) => {
      e.stopPropagation();
      toggleArchive(photo.id, folderId);
    };
    div.querySelector('[data-action="delete"]').onclick = (e) => {
      e.stopPropagation();
      if (confirm('Удалить фото?')) deletePhoto(photo.id, folderId);
    };
    div.querySelector('[data-action="move"]').onclick = (e) => {
      e.stopPropagation();
      openMoveModal(photo.id, folderId);
    };
    
    return div;
  }

  // ========== ИНИЦИАЛИЗАЦИЯ ==========
  document.getElementById('createFolderBtn').onclick = () => createFolder();
  document.getElementById('addPhotoBtn').onclick = () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.multiple = true;
    input.onchange = () => {
      if (input.files && input.files.length) addPhotos(input.files);
    };
    input.click();
  };
  
  document.getElementById('closeModalBtn').onclick = () => {
    document.getElementById('moveModal').classList.remove('active');
  };
  
  loadData();
</script>
</body>
</html>
