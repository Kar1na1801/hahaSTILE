<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Образы по сезонам — мобильная версия (улучшенная)</title>
  <style>
    :root{
      --bg: #0f1115;
      --card: #171a22;
      --text: #e9e9ea;
      --muted: #b5bbcf;
      --accent: #7aa2f7;
      --border: rgba(255,255,255,.08);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial; background: var(--bg); color: var(--text); }

    header {
      padding: 14px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    header h1 { margin: 0 0 6px; font-size: 1.2rem; }
    header p { margin: 0; color: var(--muted); font-size: 0.92rem; }

    .container { padding: 8px 12px 20px; max-width: 100%; }

    .topbar {
      display: grid; gap: 8px;
      grid-template-columns: 1fr;
      margin-bottom: 8px;
    }
    .row { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
    .input, .select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #1e2030;
      color: var(--text);
    }
    .btn {
      background: var(--accent);
      color: #0b0e1a;
      border: none; padding: 12px;
      border-radius: 8px; cursor: pointer;
      font-weight: 600;
      width: 100%;
    }
    .btn.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .season-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    }

    .card {
      background: linear-gradient(135deg, rgba(23,26,34,.95), rgba(22,26,38,.95));
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card-header {
      padding: 12px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,.05);
    }
    .card-header h3 { margin: 0; font-size: 1rem; }
    .badge { font-size: 0.75rem; padding: 4px 8px; border-radius: 999px; background: #2b324e; color: #fff; }

    .gallery {
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(86px, 1fr));
      gap: 6px;
      align-items: center;
    }
    .thumb { width: 100%; height: 86px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); background:#111; cursor: pointer; }

    .folder-veil { padding: 8px; display: grid; grid-template-columns: 1fr; gap: 6px; }

    .lightbox {
      position: fixed; inset: 0; background: rgba(0,0,0,.8);
      display: none; align-items: center; justify-content: center;
      padding: 12px;
    }
    .lightbox.open { display: flex; }
    .lightbox-content {
      max-width: 90vw; max-height: 80vh; position: relative;
    }
    .lightbox-content img { width: 100%; height: auto; border-radius: 8px; display: block; }
    .nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid var(--border); background: rgba(255,255,255,.1);
      color: white; display: grid; place-items: center; cursor: pointer;
    }
    .nav.prev { left: -60px; }
    .nav.next { right: -60px; }

    @media (max-width: 600px){
      .season-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
      .thumb { height: 76px; }
    }

    /* Удобство для сенсорных экранов: крупные элементы */
    .card, .thumb { touch-action: manipulation; }
  </style>
</head>
<body>
  <header>
    <h1>Мои образы по сезонам</h1>
    <p>Удобное управление папками и фото прямо на телефоне</p>
  </header>

  <main class="container">
    <section class="topbar" aria-label="Управление папками">
      <div class="row" style="gap:8px;">
        <input id="newFolderName" class="input" placeholder="Название новой папки (например, Лето 2025)">
      </div>
      <div class="row" style="margin-top:6px;">
        <button id="btnAddFolder" class="btn" type="button">Добавить папку</button>
        <button id="btnExport" class="btn secondary" type="button" style="margin-left:8px;">Экспорт/Импорт</button>
      </div>
    </section>

    <section aria-labelledby="season-label" class="season-section">
      <h2 id="season-label" style="font-size:1rem; margin:0 0 8px;">Папки</h2>
      <div id="season-grid" class="season-grid"></div>
    </section>
  </main>

  <!-- Светлый просмотр фото -->
  <div id="lightbox" class="lightbox" role="dialog" aria-label="Просмотр фото">
    <button class="nav prev" id="lbPrev" aria-label="Предыдущее">◀</button>
    <div class="lightbox-content">
      <img id="lbImg" src="" alt="Фото">
    </div>
    <button class="nav next" id="lbNext" aria-label="Следующее">▶</button>
  </div>

  <script>
    const STORAGE_KEY = 'fashion_albums_mobile_v3';
    let data = { folders: [] };
    const grid = document.getElementById('season-grid');
    const newFolderName = document.getElementById('newFolderName');
    const btnAddFolder = document.getElementById('btnAddFolder');
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    const lbPrev = document.getElementById('lbPrev');
    const lbNext = document.getElementById('lbNext');
    let currentView = { folderId: null, photoIndex: 0 };

    function uid(){ return 'id_' + Math.random().toString(36).slice(2,9); }

    function load(){ try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) data = JSON.parse(raw);
    } catch(e){ console.warn('Ошибка загрузки данных', e); } }
    function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

    function addFolder(name){
      // базовая защита от дубликатов
      const exists = data.folders.some(f => f.name.toLowerCase() === name.toLowerCase().trim());
      if (exists) {
        alert('Папка с таким названием уже существует.');
        return;
      }
      data.folders.push({ id: uid(), name, created: Date.now(), photos: [] });
    }

    function ensureFolderExists(folderId){
      return data.folders.find(x => x.id === folderId);
    }

    function addPhoto(folderId, dataURL){
      const f = data.folders.find(x => x.id === folderId);
      if(!f) return;
      f.photos.push({ id: uid(), src: dataURL, date: Date.now(), done:false, important:0 });
      f.photos.sort((a,b) => a.date - b.date);
    }

    function deletePhoto(folderId, photoId){
      const f = data.folders.find(x => x.id === folderId);
      if(!f) return;
      f.photos = f.photos.filter(p => p.id !== photoId);
    }

    function movePhoto(photoId, fromFolderId, toFolderId){
      const from = data.folders.find(f => f.id === fromFolderId);
      const to = data.folders.find(f => f.id === toFolderId);
      if(!from || !to) return;
      const idx = from.photos.findIndex(p => p.id === photoId);
      if(idx < 0) return;
      const [ph] = from.photos.splice(idx, 1);
      to.photos.push(ph);
      to.photos.sort((a,b) => a.date - b.date);
    }

    function reorderPhoto(folderId, photoId, dir){
      const f = data.folders.find(x => x.id === folderId);
      if(!f) return;
      const idx = f.photos.findIndex(p => p.id === photoId);
      if(idx < 0) return;
      const ni = dir === 'up' ? idx-1 : idx+1;
      if(ni < 0 || ni >= f.photos.length) return;
      [f.photos[idx], f.photos[ni]] = [f.photos[ni], f.photos[idx]];
    }

    function toggleDone(folderId, photoId){
      const f = data.folders.find(x => x.id === folderId);
      if(!f) return;
      const p = f.photos.find(x => x.id === photoId);
      if(!p) return;
      p.done = !p.done;
      f.photos.sort((a,b) => Number(a.done) - Number(b.done) || a.date - b.date);
    }

    function editFolderName(folderId, newName){
      const f = data.folders.find(x => x.id === folderId);
      if(!f) return;
      f.name = newName;
    }

    function openLightbox(folderId, index){
      currentView = { folderId, photoIndex: index };
      const f = data.folders.find(x => x.id === folderId);
      if(!f || f.photos.length === 0) return;
      lbImg.src = f.photos[index].src;
      lb.classList.add('open');
    }

    function closeLightbox(){ lb.classList.remove('open'); }

    function showNext(){ 
      const f = data.folders.find(x => x.id === currentView.folderId);
      if(!f) return;
      const idx = currentView.photoIndex;
      const next = (idx + 1) % f.photos.length;
      currentView.photoIndex = next;
      lbImg.src = f.photos[next].src;
    }
    function showPrev(){
      const f = data.folders.find(x => x.id === currentView.folderId);
      if(!f) return;
      const idx = currentView.photoIndex;
      const prev = (idx - 1 + f.photos.length) % f.photos.length;
      currentView.photoIndex = prev;
      lbImg.src = f.photos[prev].src;
    }

    function createFileInput(forFolderId){
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.multiple = true;
      input.style.display = 'block';
      input.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files || []);
        for (const file of files){
          const r = new FileReader();
          r.onload = () => { addPhoto(forFolderId, r.result); render(); save(); };
          r.readAsDataURL(file);
        }
        input.value = '';
      });
      input.click();
      return input;
    }

    function render(){
      grid.innerHTML = '';
      data.folders.forEach(folder => {
        const card = document.createElement('section');
        card.className = 'card';

        const header = document.createElement('div');
        header.className = 'card-header';
        // Название папки как editable поле
        const title = document.createElement('input');
        title.value = folder.name;
        title.style.width = '100%';
        title.style.background = 'transparent';
        title.style.border = 'none';
        title.style.color = '#fff';
        title.style.fontWeight = '700';
        title.addEventListener('input', () => folder.name = title.value);
        title.addEventListener('blur', () => save());
        header.appendChild(title);

        const badge = document.createElement('span');
        badge.className = 'badge';
        const notDone = folder.photos.filter(p => !p.done).length;
        badge.textContent = notDone + ' фото';
        header.appendChild(badge);

        // галерея внутри папки
        const gallery = document.createElement('div');
        gallery.className = 'gallery';
        const visible = folder.photos.filter(p => !p.done);
        visible.forEach((p, idx) => {
          const img = document.createElement('img');
          img.className = 'thumb';
          img.src = p.src;
          img.alt = 'Фото';
          img.addEventListener('click', () => openLightbox(folder.id, folder.photos.findIndex(x => x.id === p.id)));
          gallery.appendChild(img);
        });

        // секция выполненных
        if (folder.photos.filter(p => p.done).length > 0){
          const doneSection = document.createElement('details');
          const summary = document.createElement('summary');
          summary.textContent = 'Показать выполненные (' + folder.photos.filter(p => p.done).length + ')';
          doneSection.appendChild(summary);
          const dGallery = document.createElement('div');
          dGallery.className = 'gallery';
          folder.photos.filter(p => p.done).forEach(p => {
            const dImg = document.createElement('img');
            dImg.className = 'thumb';
            dImg.src = p.src;
            dImg.alt = 'Выполнено';
            dGallery.appendChild(dImg);
          });
          doneSection.appendChild(dGallery);
          gallery.appendChild(doneSection);
        }

        // кнопки управления папкой
        const actions = document.createElement('div');
        actions.className = 'card-actions';

        const addBtn = document.createElement('button');
        addBtn.className = 'btn';
        addBtn.textContent = 'Добавить фото';
        addBtn.addEventListener('click', () => createFileInput(folder.id));

        const renameBtn = document.createElement('button');
        renameBtn.className = 'btn secondary';
        renameBtn.textContent = 'Переименовать';
        renameBtn.addEventListener('click', () => {
          const proposed = prompt('Новое название папки:', folder.name);
          if (proposed && proposed.trim()) {
            folder.name = proposed.trim();
            render(); save();
          }
        });

        const delFolder = document.createElement('button');
        delFolder.className = 'btn secondary';
        delFolder.textContent = 'Удалить папку';
        delFolder.addEventListener('click', () => {
          if (confirm('Удалить папку и все фотографии в ней?')) {
            data.folders = data.folders.filter(f => f.id !== folder.id);
            render(); save();
          }
        });

        // простая кнопка перемещения выбранных фото (пользователь сам видит выпадающий список под фото)
        const moveFolderSelector = document.createElement('select');
        moveFolderSelector.className = 'select';
        moveFolderSelector.innerHTML = `<option value="">Переместить в...</option>` +
          data.folders.filter(f => f.id !== folder.id).map(f => `<option value="${f.id}">${f.name}</option>`).join('');
        moveFolderSelector.addEventListener('change', (e) => {
          const targetId = e.target.value;
          if (targetId) {
            // перенос первой фотографии как пример; можно расширить на выбор нескольких
            if (folder.photos.length > 0) {
              const photoId = folder.photos[0].id;
              movePhoto(photoId, folder.id, targetId);
              render(); save();
            }
            e.target.value = '';
          }
        });

        actions.appendChild(addBtn);
        actions.appendChild(renameBtn);
        actions.appendChild(delFolder);
        actions.appendChild(moveFolderSelector);

        card.appendChild(header);
        card.appendChild(gallery);
        card.appendChild(actions);

        grid.appendChild(card);
      });
    }

    // Инициализация
    load();
    if (data.folders.length === 0){
      data.folders = [
        { id: 'f1', name: 'Лето', created: Date.now(), photos: [] },
        { id: 'f2', name: 'Зима', created: Date.now(), photos: [] },
        { id: 'f3', name: 'Весна', created: Date.now(), photos: [] },
        { id: 'f4', name: 'Осень', created: Date.now(), photos: [] }
      ];
    }
    render();
    btnAddFolder.addEventListener('click', () => {
      const name = (newFolderName.value || '').trim();
      if (!name) return;
      addFolder(name);
      newFolderName.value = '';
      render(); save();
    });

    // Lightbox навигация
    lbPrev.addEventListener('click', showPrev);
    lbNext.addEventListener('click', showNext);
    lb.addEventListener('click', (e) => {
      if (e.target === lb) closeLightbox();
    });

    window.addEventListener('beforeunload', save);
  </script>
</body>
</html>
