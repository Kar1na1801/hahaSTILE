<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Образы по сезонам — массовые операции</title>
  <style>
    :root{
      --bg: #0b0e14;
      --card: #141824;
      --text: #f7f8fa;
      --muted: #a6adbf;
      --accent: #4f8cff;
      --border: rgba(255,255,255,.12);
      --shadow: 0 8px 20px rgba(0,0,0,.25);
      --done: #2a3a2e;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); }
    a { color: inherit; text-decoration: none; }

    header {
      padding: 14px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    header .logo {
      width: 40px; height: 40px; border-radius: 10px;
      display: grid; place-items: center; font-weight: 700;
      background: linear-gradient(135deg, #1e1e2a, #2a2a3a);
    }
    header h1 { font-size: 1rem; margin: 0; }
    header p { margin: 0; color: var(--muted); font-size: .9rem; }

    .container { padding: 10px; max-width: 1200px; margin: 0 auto; }

    /* Панель управления */
    .toolbar { display: grid; gap: 8px; grid-template-columns: 1fr auto; align-items: center; margin-bottom: 10px; }
    .row { display: flex; gap: 8px; align-items: center; }
    .input, .select {
      width: 100%; padding: 12px; border-radius: 10px;
      border: 1px solid var(--border); background: #1a1f2b; color: var(--text);
    }
    .btn {
      background: var(--accent); color: #0b0e1a; border: none;
      padding: 12px 14px; border-radius: 10px; font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(0,0,0,.25);
    }
    .btn.secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn.danger { background: #e74c3c; color: white; }

    /* Сетка папок в стиле Apple Gallery */
    .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }

    .card {
      background: linear-gradient(135deg, rgba(20,24,36,.95), rgba(18,22,32,.95));
      border: 1px solid var(--border); border-radius: 12px; padding: 12px; box-shadow: var(--shadow);
      display: flex; flex-direction: column;
    }
    .card-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .folder-title { font-weight: 700; font-size: 1rem; border: none; background: transparent; color: #fff; width: 100%; }

    .gallery {
      padding: 6px 0;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 6px;
      max-height: 340px;
      overflow: hidden;
      /* когда много фото — кнопка открыть папку покажет детальную галерею внутри карточки */
    }
    .thumb { width: 100%; height: 72px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; background:#111; }

    /* Детальная галерея внутри папки (раскрываемая секция) */
    .folder-veil { display: none; padding: 6px 0 0; }

    /* Светлый просмотр фото (модальное окно) */
    .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.8); display: none; align-items: center; justify-content: center; padding: 12px; }
    .lightbox.open { display: flex; }
    .lightbox-content { max-width: 92vw; max-height: 80vh; position: relative; }
    .lightbox-content img { width: 100%; height: auto; border-radius: 12px; display: block; }
    .nav { position: absolute; top: 50%; transform: translateY(-50%); width: 44px; height: 44px; border-radius: 50%;
      border: 1px solid var(--border); background: rgba(255,255,255,.15); color: #fff; display: grid; place-items: center; cursor: pointer; }
    .nav.prev { left: -60px; }
    .nav.next { right: -60px; }

    /* Модальные меню для выбора папки переноса и массовых операций */
    .tools { display: flex; gap: 8px; flex-wrap: wrap; }

    /* Массовые операции UI внутри папки */
    .select-all { display: inline-flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: 8px; border:1px solid var(--border); background:#1e2030; }

    @media (max-width: 800px){
      .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
      .thumb { height: 68px; }
      .lightbox-content { max-width: 90vw; max-height: 70vh; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo" aria-label="Логотип">A</div>
    <div>
      <h1>Образы по сезонам — Apple-подобная галерея</h1>
      <p>Удобное управление папками, массовые операции и просмотр фото без потери данных</p>
    </div>
  </header>

  <main class="container">
    <section class="toolbar" aria-label="Управление папками">
      <div class="row" style="gap:8px;">
        <input id="newFolderName" class="input" placeholder="Название новой папки (например, Лето 2025)">
        <button id="btnAddFolder" class="btn" type="button">Добавить папку</button>
      </div>
      <div class="row" style="margin-top:8px;">
        <button id="btnExport" class="btn secondary" type="button">Экспорт/Импорт</button>
        <button id="btnMerge" class="btn secondary" type="button" style="margin-left:8px;">Сбросить выбор</button>
      </div>
    </section>

    <section aria-label="Папки" class="grid" id="grid"></section>
  </main>

  <div id="lightbox" class="lightbox" role="dialog" aria-label="Просмотр фото">
    <button class="nav prev" id="lbPrev" aria-label="Предыдущее">◀</button>
    <div class="lightbox-content">
      <img id="lbImg" src="" alt="Фото">
    </div>
    <button class="nav next" id="lbNext" aria-label="Следующее">▶</button>
  </div>

  <script>
    const STORAGE_KEY = 'fashion_gallery_apple_style_v2';
    let data = { folders: [] };
    const grid = document.getElementById('grid');
    const newFolderName = document.getElementById('newFolderName');
    const btnAddFolder = document.getElementById('btnAddFolder');
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    const lbPrev = document.getElementById('lbPrev');
    const lbNext = document.getElementById('lbNext');
    let current = { folderId: null, index: 0 };
    let selectedPhotoIds = new Set();

    function uid(){ return 'id_' + Math.random().toString(36).slice(2,9); }

    function load(){
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed.folders)) data = parsed;
        }
      } catch (e) { console.warn('Не удалось загрузить данные', e); }
    }
    function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

    function addFolder(name){
      if (!name.trim()) return;
      const exists = data.folders.some(f => f.name.toLowerCase() === name.toLowerCase().trim());
      if (exists) { alert('Папка с таким названием уже существует.'); return; }
      data.folders.push({ id: uid(), name: name.trim(), created: Date.now(), photos: [] });
    }

    function addPhoto(folderId, src){
      const f = data.folders.find(x => x.id === folderId);
      if(!f) return;
      f.photos.push({ id: uid(), src, date: Date.now(), done:false, selected:false });
      f.photos.sort((a,b) => a.date - b.date);
    }

    function deletePhoto(folderId, photoId){
      const f = data.folders.find(x => x.id === folderId);
      if(!f) return;
      f.photos = f.photos.filter(p => p.id !== photoId);
      selectedPhotoIds.delete(photoId);
    }

    function movePhotos(folderFromId, folderToId, photoIds){
      const from = data.folders.find(f => f.id === folderFromId);
      const to = data.folders.find(f => f.id === folderToId);
      if(!from || !to) return;
      photoIds.forEach(pid => {
        const idx = from.photos.findIndex(p => p.id === pid);
        if (idx >= 0) {
          to.photos.push(from.photos.splice(idx, 1)[0]);
        }
      });
      // сортируем в целевой по дате
      to.photos.sort((a,b) => a.date - b.date);
    }

    function deleteFolder(folderId){
      data.folders = data.folders.filter(f => f.id !== folderId);
    }

    function reorderPhoto(folderId, photoId, dir){
      const f = data.folders.find(x => x.id === folderId);
      if(!f) return;
      const idx = f.photos.findIndex(p => p.id === photoId);
      if (idx < 0) return;
      const ni = dir === 'up' ? idx-1 : idx+1;
      if (ni < 0 || ni >= f.photos.length) return;
      [f.photos[idx], f.photos[ni]] = [f.photos[ni], f.photos[idx]];
    }

    function toggleDone(folderId, photoId){
      const f = data.folders.find(x => x.id === folderId);
      if(!f) return;
      const p = f.photos.find(x => x.id === photoId);
      if(!p) return;
      p.done = !p.done;
      // архив: перемещаем выполненные в архив внутри папки
      if (p.done){
        // пометим как архивированное
        p._archived = true;
      }
      // не удаляем из списка, просто сортируем
      f.photos.sort((a,b) => Number(a.done) - Number(b.done) || a.date - b.date);
    }

    function editFolderName(folderId, newName){
      const f = data.folders.find(x => x.id === folderId);
      if(!f) return;
      f.name = newName;
    }

    // Архив выполненных: возвращаем их как отдельный блок в папке
    function renderFolderFolder(folder){
      // создать внутреннюю структуру карточки папки
    }

    function openLightbox(folderId, index){
      current = { folderId, index };
      const f = data.folders.find(x => x.id === folderId);
      if(!f || f.photos.length === 0) return;
      lbImg.src = f.photos[index].src;
      lb.classList.add('open');
    }

    function closeLightbox(){ lb.classList.remove('open'); }

    function showNext(){
      const f = data.folders.find(x => x.id === current.folderId);
      if(!f) return;
      current.index = (current.index + 1) % f.photos.length;
      lbImg.src = f.photos[current.index].src;
    }
    function showPrev(){
      const f = data.folders.find(x => x.id === current.folderId);
      if(!f) return;
      current.index = (current.index - 1 + f.photos.length) % f.photos.length;
      lbImg.src = f.photos[current.index].src;
    }

    function createFileInput(forFolderId){
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.multiple = true;
      input.style.display = 'block';
      input.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files || []);
        for (const file of files){
          const r = new FileReader();
          r.onload = () => { addPhoto(forFolderId, r.result); render(); save(); };
          r.readAsDataURL(file);
        }
        input.value = '';
      });
      input.click();
      return input;
    }

    function toggleSelectAll(folderId, selectState){
      const f = data.folders.find(x => x.id === folderId);
      if(!f) return;
      f.photos.forEach(p => p.selected = selectState);
      // обновление набора выбранных
      updateSelectedSet();
    }

    function updateSelectedSet(){
      selectedPhotoIds.clear();
      data.folders.forEach(f => {
        f.photos.forEach(p => {
          if (p.selected) selectedPhotoIds.add(p.id);
        });
      });
    }

    function render(){
      grid.innerHTML = '';
      data.folders.forEach(folder => {
        const card = document.createElement('section');
        card.className = 'card';

        // Header
        const header = document.createElement('div');
        header.className = 'card-header';
        const title = document.createElement('input');
        title.className = 'folder-name';
        title.value = folder.name;
        title.addEventListener('input', () => folder.name = title.value);
        title.addEventListener('blur', () => save());
        header.appendChild(title);

        const badge = document.createElement('span');
        badge.className = 'badge';
        const visible = folder.photos.filter(p => !p.done).length;
        const archived = folder.photos.filter(p => p.done).length;
        badge.textContent = 'Всего: ' + folder.photos.length + ' | Активно: ' + visible + ' | Архив: ' + archived;
        header.appendChild(badge);

        // Галерея внутри папки
        const gallery = document.createElement('div');
        gallery.className = 'gallery';
        const activePhotos = folder.photos.filter(p => !p.done);
        activePhotos.forEach((p) => {
          const wrap = document.createElement('div');
          wrap.style.position = 'relative';
          const img = document.createElement('img');
          img.className = 'thumb';
          img.src = p.src;
          img.alt = 'Фото';
          img.addEventListener('click', () => {
            // выбрали фото — открыть модал
            const idx = folder.photos.findIndex(pp => pp.id === p.id);
            openLightbox(folder.id, idx);
          });
          // чекбокс для массового выбора
          const chk = document.createElement('input');
          chk.type = 'checkbox';
          chk.style.position = 'absolute';
          chk.style.top = '6px'; chk.style.left = '6px';
          chk.checked = !!p.selected;
          chk.addEventListener('change', () => {
            p.selected = chk.checked;
            if (chk.checked) selectedPhotoIds.add(p.id);
            else selectedPhotoIds.delete(p.id);
          });

          wrap.appendChild(img);
          wrap.appendChild(chk);
          gallery.appendChild(wrap);
        });

        // архив выполненных внутри папки
        const archiveSection = document.createElement('details');
        const archiveSummary = document.createElement('summary');
        const doneCount = folder.photos.filter(p => p.done).length;
        if (doneCount > 0){
          archiveSummary.textContent = 'Архив выполненных: ' + doneCount;
          const dGallery = document.createElement('div');
          dGallery.className = 'gallery';
          folder.photos.filter(p => p.done).forEach(p => {
            const dImg = document.createElement('img');
            dImg.className = 'thumb';
            dImg.src = p.src;
            dImg.alt = 'Архив';
            dGallery.appendChild(dImg);
          });
          archiveSection.appendChild(archiveSummary);
          archiveSection.appendChild(dGallery);
          gallery.appendChild(archiveSection);
        }

        // управление папкой
        const actions = document.createElement('div');
        actions.className = 'toolbar';
        actions.style.display = 'flex'; actions.style.gap = '8px'; actions.style.flexWrap = 'wrap';

        const addBtn = document.createElement('button');
        addBtn.className = 'btn';
        addBtn.textContent = 'Добавить фото';
        addBtn.style.flex = '1 1 auto';
        addBtn.addEventListener('click', () => createFileInput(folder.id));

        const selectAllBtn = document.createElement('button');
        selectAllBtn.className = 'btn secondary';
        selectAllBtn.textContent = 'Выделить всё';
        selectAllBtn.style.flex = '1 1 auto';
        selectAllBtn.addEventListener('click', () => {
          folder.photos.forEach(p => p.selected = true);
          render(); save();
          // обновим набор
          updateSelectedSet();
        });

        const clearSelectionBtn = document.createElement('button');
        clearSelectionBtn.className = 'btn secondary';
        clearSelectionBtn.textContent = 'Снять выделение';
        clearSelectionBtn.style.flex = '1 1 auto';
        clearSelectionBtn.addEventListener('click', () => {
          folder.photos.forEach(p => p.selected = false);
          render(); save();
          updateSelectedSet();
        });

        const moveBtn = document.createElement('button');
        moveBtn.className = 'btn';
        moveBtn.textContent = 'Переместить выбранное';
        moveBtn.style.flex = '1 1 auto';
        moveBtn.addEventListener('click', () => {
          if (selectedPhotoIds.size === 0){
            alert('Нет выбранных фото');
            return;
          }
          // список папок для переноса
          const targetName = prompt('Переместить в папку: введите точное название или выберите из списка (пока покажу prompt)');
          if (!targetName) return;
          const targetFolder = data.folders.find(f => f.name.toLowerCase() === targetName.toLowerCase());
          if (!targetFolder){
            alert('Папка не найдена');
            return;
          }
          movePhotos(folder.id, targetFolder.id, Array.from(selectedPhotoIds));
          // очистим выбор
          data.folders.forEach(f => f.photos.forEach(p => p.selected = false));
          render(); save();
          selectedPhotoIds.clear();
        });

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'btn secondary';
        deleteBtn.textContent = 'Удалить выбранные';
        deleteBtn.style.flex = '1 1 auto';
        deleteBtn.addEventListener('click', () => {
          if (selectedPhotoIds.size === 0){
            alert('Нет выбранных фото');
            return;
          }
          if (!confirm('Удалить выбранные фото?')) return;
          folder.photos = folder.photos.filter(p => !selectedPhotoIds.has(p.id));
          selectedPhotoIds.clear();
          render(); save();
        });

        actions.appendChild(addBtn);
        actions.appendChild(selectAllBtn);
        actions.appendChild(clearSelectionBtn);
        actions.appendChild(moveBtn);
        actions.appendChild(deleteBtn);

        // собрать карточку
        card.appendChild(header);
        card.appendChild(gallery);
        card.appendChild(actions);

        grid.appendChild(card);
      });
    }

    // Инициализация
    load();
    if (data.folders.length === 0){
      data.folders = [
        { id: 'f1', name: 'Лето', created: Date.now(), photos: [] },
        { id: 'f2', name: 'Зима', created: Date.now(), photos: [] },
        { id: 'f3', name: 'Весна', created: Date.now(), photos: [] },
        { id: 'f4', name: 'Осень', created: Date.now(), photos: [] }
      ];
    }
    render();
    btnAddFolder.addEventListener('click', () => {
      const name = (newFolderName.value || '').trim();
      if (!name) return;
      addFolder(name);
      newFolderName.value = '';
      render(); save();
    });

    lbPrev.addEventListener('click', showPrev);
    lbNext.addEventListener('click', showNext);
    lb.addEventListener('click', (e) => { if (e.target === lb) closeLightbox(); });
    window.addEventListener('beforeunload', save);

  </script>
</body>
</html>
