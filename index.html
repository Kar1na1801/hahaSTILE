<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Сезонный гардероб</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #0f1115;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      color: #e9e9ea;
      padding: 16px 12px 32px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      background: linear-gradient(135deg, #e0e0ff, #b0aaff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 0.85rem;
      color: #9ba0b5;
    }

    .season-grid {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: linear-gradient(135deg, rgba(20,22,34,0.95), rgba(18,22,38,0.95));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      overflow: hidden;
    }

    .card-header {
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.2);
    }

    .card-header h3 {
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      background: #2b324e;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.75rem;
      color: white;
    }

    .gallery-scroll {
      overflow-x: auto;
      overflow-y: hidden;
      padding: 16px;
      white-space: nowrap;
      scrollbar-width: thin;
    }

    .gallery-scroll::-webkit-scrollbar {
      height: 4px;
    }

    .gallery {
      display: inline-flex;
      gap: 12px;
    }

    .photo-card {
      position: relative;
      display: inline-block;
      width: 110px;
      height: 110px;
      border-radius: 16px;
      overflow: hidden;
      background: #1a1e2a;
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
    }

    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .delete-photo {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(0,0,0,0.7);
      border: none;
      color: #ff8a8a;
      width: 26px;
      height: 26px;
      border-radius: 20px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .photo-date {
      position: absolute;
      bottom: 6px;
      left: 6px;
      background: rgba(0,0,0,0.6);
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 12px;
      color: #ddd;
    }

    .empty-gallery {
      padding: 32px 16px;
      text-align: center;
      color: #7e85a0;
      font-size: 0.85rem;
      white-space: normal;
    }

    .card-actions {
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.04);
    }

    .btn-add {
      background: #7aa2f7;
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      color: #0b0e1a;
      cursor: pointer;
      transition: 0.1s;
    }

    .btn-add:active {
      transform: scale(0.96);
    }

    .photo-count {
      font-size: 0.7rem;
      color: #b5bbcf;
      background: rgba(255,255,255,0.05);
      padding: 5px 12px;
      border-radius: 30px;
    }

    footer {
      text-align: center;
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 0.7rem;
      color: #6e748c;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 2000;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(12px);
    }

    .modal.active {
      display: flex;
    }

    .modal img {
      max-width: 90%;
      max-height: 80%;
      object-fit: contain;
      border-radius: 20px;
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 28px;
      width: 48px;
      height: 48px;
      border-radius: 30px;
      cursor: pointer;
    }

    .modal-caption {
      position: absolute;
      bottom: 30px;
      background: rgba(0,0,0,0.6);
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>Мой стиль по сезонам</h1>
    <p class="sub">Нажмите «Добавить фото» → выберите из галереи</p>
  </header>

  <div class="season-grid" id="seasonsGrid"></div>

  <footer>
    📸 Фото сохраняются в телефоне · GitHub Pages
  </footer>
</div>

<div id="modal" class="modal">
  <button class="modal-close" id="modalClose">✕</button>
  <img id="modalImage" alt="просмотр">
  <div class="modal-caption" id="modalCaption"></div>
</div>

<script>
  (function() {
    // Сезоны
    const SEASONS = [
      { id: 'summer', name: 'Лето', emoji: '☀️' },
      { id: 'winter', name: 'Зима', emoji: '❄️' },
      { id: 'spring', name: 'Весна', emoji: '🌸' },
      { id: 'autumn', name: 'Осень', emoji: '🍂' }
    ];
    
    const STORAGE_KEY = 'wardrobe_app';
    
    let data = {
      summer: [],
      winter: [],
      spring: [],
      autumn: []
    };
    
    const seasonsGrid = document.getElementById('seasonsGrid');
    const modal = document.getElementById('modal');
    const modalImage = document.getElementById('modalImage');
    const modalCaption = document.getElementById('modalCaption');
    const modalClose = document.getElementById('modalClose');
    
    // Загрузка сохранённых фото
    function loadData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          SEASONS.forEach(s => {
            if (parsed[s.id]) data[s.id] = parsed[s.id];
          });
        } catch(e) {}
      }
      render();
    }
    
    // Сохранение
    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }
    
    // Добавление фото
    function addPhotos(seasonId, files) {
      if (!files || files.length === 0) return;
      
      const fileArray = Array.from(files);
      let loaded = 0;
      
      fileArray.forEach(file => {
        const reader = new FileReader();
        
        reader.onload = function(e) {
          const photo = {
            id: Date.now() + '-' + Math.random().toString(36).substr(2, 8),
            url: e.target.result,
            date: new Date().toISOString()
          };
          data[seasonId].unshift(photo);
          loaded++;
          
          if (loaded === fileArray.length) {
            saveData();
            render();
          }
        };
        
        reader.onerror = function() {
          loaded++;
          if (loaded === fileArray.length) {
            saveData();
            render();
          }
        };
        
        reader.readAsDataURL(file);
      });
    }
    
    // Удаление
    function deletePhoto(seasonId, photoId) {
      data[seasonId] = data[seasonId].filter(p => p.id != photoId);
      saveData();
      render();
    }
    
    // Формат даты
    function formatDate(iso) {
      if (!iso) return 'недавно';
      const d = new Date(iso);
      const now = new Date();
      const diff = Math.floor((now - d) / 86400000);
      if (diff === 0) return 'сегодня';
      if (diff === 1) return 'вчера';
      if (diff < 7) return `${diff} дн.`;
      return d.toLocaleDateString('ru-RU', {day: 'numeric', month: 'short'});
    }
    
    // Отрисовка
    function render() {
      if (!seasonsGrid) return;
      seasonsGrid.innerHTML = '';
      
      for (let season of SEASONS) {
        const photos = data[season.id];
        const count = photos.length;
        
        const card = document.createElement('div');
        card.className = 'card';
        card.setAttribute('data-season', season.id);
        
        let galleryHtml = '';
        if (count === 0) {
          galleryHtml = `<div class="empty-gallery">📸 Нет фото. Нажмите «Добавить фото»</div>`;
        } else {
          let items = '';
          for (let photo of photos) {
            items += `
              <div class="photo-card" data-photo-id="${photo.id}" data-photo-url="${photo.url.replace(/"/g, '&quot;')}" data-season="${season.id}">
                <img src="${photo.url}" loading="lazy">
                <button class="delete-photo" data-photo-id="${photo.id}" data-season="${season.id}">✕</button>
                <span class="photo-date">📅 ${formatDate(photo.date)}</span>
              </div>
            `;
          }
          galleryHtml = `<div class="gallery-scroll"><div class="gallery">${items}</div></div>`;
        }
        
        card.innerHTML = `
          <div class="card-header">
            <h3>${season.emoji} ${season.name}</h3>
            <span class="badge">${count} фото</span>
          </div>
          ${galleryHtml}
          <div class="card-actions">
            <button class="btn-add" data-season="${season.id}">➕ Добавить фото</button>
            <span class="photo-count">📸 ${count} сохранено</span>
          </div>
        `;
        
        seasonsGrid.appendChild(card);
      }
      
      attachEvents();
    }
    
    function attachEvents() {
      // Удаление
      document.querySelectorAll('.delete-photo').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          const seasonId = btn.getAttribute('data-season');
          const photoId = btn.getAttribute('data-photo-id');
          if (seasonId && photoId) deletePhoto(seasonId, photoId);
        };
      });
      
      // Открытие фото
      document.querySelectorAll('.photo-card').forEach(card => {
        card.onclick = (e) => {
          if (e.target.classList && e.target.classList.contains('delete-photo')) return;
          const img = card.querySelector('img');
          const seasonId = card.getAttribute('data-season');
          const season = SEASONS.find(s => s.id === seasonId);
          if (img && img.src) {
            modalImage.src = img.src;
            modalCaption.innerText = season?.name || 'Фото';
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
          }
        };
      });
      
      // Добавление фото
      document.querySelectorAll('.btn-add').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          const seasonId = btn.getAttribute('data-season');
          
          const input = document.createElement('input');
          input.type = 'file';
          input.accept = 'image/*';
          input.multiple = true;
          input.style.display = 'none';
          document.body.appendChild(input);
          
          input.onchange = () => {
            if (input.files && input.files.length) {
              addPhotos(seasonId, input.files);
            }
            document.body.removeChild(input);
          };
          
          input.click();
        };
      });
    }
    
    // Модалка
    modalClose.onclick = () => {
      modal.classList.remove('active');
      document.body.style.overflow = '';
    };
    modal.onclick = (e) => {
      if (e.target === modal) {
        modal.classList.remove('active');
        document.body.style.overflow = '';
      }
    };
    
    // Drag & drop
    document.body.ondragover = (e) => { e.preventDefault(); };
    document.body.ondrop = (e) => {
      e.preventDefault();
      const files = e.dataTransfer.files;
      if (files && files.length) {
        const card = e.target.closest('.card');
        if (card) {
          const seasonId = card.getAttribute('data-season');
          if (seasonId) addPhotos(seasonId, files);
        }
      }
    };
    
    loadData();
  })();
</script>
</body>
</html>
