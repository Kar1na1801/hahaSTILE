<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Образы по сезонам — простой мобильный UX</title>
  <style>
    :root{
      --bg: #0b0e14;
      --card: #141824;
      --text: #f7f8fa;
      --muted: #a6afbf;
      --accent: #4f8cff;
      --border: rgba(255,255,255,.14);
      --shadow: 0 6px 18px rgba(0,0,0,.25);
      --done: #2a3a2e;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial; background: var(--bg); color: var(--text); }

    header {
      padding: 14px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .logo { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #1e1e2a, #2a2a3a); display: grid; place-items: center; font-weight: 700; }
    h1 { font-size: 1rem; margin: 0; }
    p { margin: 0; color: var(--muted); font-size: .9rem; }

    .container { padding: 12px; max-width: 1000px; margin: 0 auto; }

    .toolbar { display: grid; gap: 8px; grid-template-columns: 1fr auto; align-items: center; margin-bottom: 10px; }
    .row { display: flex; gap: 6px; align-items: center; }
    .input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #1e2030; color: var(--text); }
    .btn { background: var(--accent); color: #0b0e1a; border: none; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; }
    .btn.secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); }

    .card { background: linear-gradient(135deg, rgba(20,24,34,.95), rgba(18,22,32,.95)); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; min-height: 210px; box-shadow: var(--shadow); }
    .card-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .folder-name { width: 100%; border: none; background: transparent; color: #fff; font-weight: 700; font-size: 1rem; padding: 0; }
    .badge { font-size: .75rem; padding: 4px 8px; border-radius: 999px; background: #2b324e; color: #fff; }

    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 6px; padding: 6px 0; align-items: center; }
    .thumb { width: 100%; height: 72px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; background: #111; }

    .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.8); display: none; align-items: center; justify-content: center; padding: 12px; }
    .lightbox.open { display: flex; }
    .lightbox-content { max-width: 90vw; max-height: 80vh; position: relative; }
    .lightbox-content img { width: 100%; height: auto; border-radius: 12px; display: block; }
    .nav { position: absolute; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,.15); border: 1px solid var(--border); color: #fff; display: grid; place-items: center; cursor: pointer; }
    .nav.prev { left: -60px; }
    .nav.next { right: -60px; }

    @media (max-width: 700px){
      .grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
      .thumb { height: 64px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">A</div>
    <div>
      <h1>Образы по сезонам — простая галерея</h1>
      <p>Удобная мобильная версия с сохранением данных и базовыми массовыми операциями</p>
    </div>
  </header>

  <main class="container">
    <section class="toolbar" aria-label="Управление папками">
      <div class="row" style="gap:6px;">
        <input id="newFolderName" class="input" placeholder="Название новой папки (например, Лето 2025)">
      </div>
      <div class="row" style="margin-top:6px;">
        <button id="btnAddFolder" class="btn" type="button">Добавить папку</button>
        <button id="btnExport" class="btn secondary" type="button">Экспорт/Импорт</button>
      </div>
    </section>

    <section aria-label="Папки" class="grid" id="grid"></section>
  </main>

  <div id="lightbox" class="lightbox" role="dialog" aria-label="Просмотр фото">
    <button class="nav prev" id="lbPrev" aria-label="Предыдущее">◀</button>
    <div class="lightbox-content">
      <img id="lbImg" src="" alt="Фото">
    </div>
    <button class="nav next" id="lbNext" aria-label="Следующее">▶</button>
  </div>

  <script>
    const STORAGE_KEY = 'fashion_gallery_compact_v1';
    let data = { folders: [] };
    const grid = document.getElementById('grid');
    const newFolderName = document.getElementById('newFolderName');
    const btnAddFolder = document.getElementById('btnAddFolder');
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    const lbPrev = document.getElementById('lbPrev');
    const lbNext = document.getElementById('lbNext');
    let current = { folderId: null, index: 0 };
    let selection = new Set();

    function uid(){ return 'id_' + Math.random().toString(36).slice(2,9); }

    function load(){
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed.folders)) data = parsed;
        }
      } catch (e) { console.warn('Ошибка загрузки данных', e); }
    }
    function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

    function addFolder(name){
      if (!name.trim()) return;
      const exists = data.folders.some(f => f.name.toLowerCase() === name.toLowerCase().trim());
      if (exists) { alert('Папка с таким названием уже существует.'); return; }
      data.folders.push({ id: uid(), name: name.trim(), created: Date.now(), photos: [] });
    }

    function addPhoto(folderId, src){
      const f = data.folders.find(x => x.id === folderId);
      if(!f) return;
      f.photos.push({ id: uid(), src, date: Date.now(), done:false, selected:false });
      f.photos.sort((a,b) => a.date - b.date);
    }

    function deletePhoto(folderId, photoId){
      const f = data.folders.find(x => x.id === folderId);
      if(!f) return;
      f.photos = f.photos.filter(p => p.id !== photoId);
      selection.delete(photoId);
    }

    function movePhotos(fromId, toId, ids){
      const from = data.folders.find(f => f.id === fromId);
      const to = data.folders.find(f => f.id === toId);
      if(!from || !to) return;
      ids.forEach(id => {
        const idx = from.photos.findIndex(p => p.id === id);
        if (idx >= 0) to.photos.push(from.photos.splice(idx,1)[0]);
      });
      to.photos.sort((a,b) => a.date - b.date);
    }

    function deleteFolder(folderId){
      data.folders = data.folders.filter(f => f.id !== folderId);
    }

    function openLightbox(folderId, index){
      current = { folderId, index };
      const f = data.folders.find(x => x.id === folderId);
      if(!f || f.photos.length === 0) return;
      lbImg.src = f.photos[index].src;
      lb.classList.add('open');
    }
    function closeLightbox(){ lb.classList.remove('open'); }

    function showNext(){
      const f = data.folders.find(x => x.id === current.folderId);
      if(!f) return;
      current.index = (current.index + 1) % f.photos.length;
      lbImg.src = f.photos[current.index].src;
    }
    function showPrev(){
      const f = data.folders.find(x => x.id === current.folderId);
      if(!f) return;
      current.index = (current.index - 1 + f.photos.length) % f.photos.length;
      lbImg.src = f.photos[current.index].src;
    }

    function createFileInput(forFolderId){
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.multiple = true;
      input.style.display = 'block';
      input.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files || []);
        for (const file of files){
          const r = new FileReader();
          r.onload = () => { addPhoto(forFolderId, r.result); render(); save(); };
          r.readAsDataURL(file);
        }
        input.value = '';
      });
      input.click();
      return input;
    }

    function render(){
      grid.innerHTML = '';
      data.folders.forEach(folder => {
        const card = document.createElement('section');
        card.className = 'card';

        // Заголовок папки
        const header = document.createElement('div');
        header.className = 'card-header';
        const title = document.createElement('input');
        title.className = 'folder-name';
        title.value = folder.name;
        title.addEventListener('input', () => folder.name = title.value);
        title.addEventListener('blur', () => save());
        header.appendChild(title);

        const badge = document.createElement('span');
        badge.className = 'badge';
        const notDone = folder.photos.filter(p => !p.done).length;
        const total = folder.photos.length;
        badge.textContent = 'Всего: ' + total + ', Активно: ' + notDone;
        header.appendChild(badge);

        // Галерея актива
        const gallery = document.createElement('div');
        gallery.className = 'gallery';
        const visible = folder.photos.filter(p => !p.done);
        visible.forEach(p => {
          const img = document.createElement('img');
          img.className = 'thumb';
          img.src = p.src;
          img.alt = 'Фото';
          img.addEventListener('click', () => {
            const idx = folder.photos.findIndex(pp => pp.id === p.id);
            openLightbox(folder.id, idx);
          });
          gallery.appendChild(img);
        });

        // архив выполненных
        const archived = folder.photos.filter(p => p.done);
        if (archived.length){
          const arch = document.createElement('details');
          const sum = document.createElement('summary');
          sum.textContent = 'Архив выполненных: ' + archived.length;
          arch.appendChild(sum);
          const arGrid = document.createElement('div');
          arGrid.className = 'gallery';
          archived.forEach(p => {
            const ai = document.createElement('img');
            ai.className = 'thumb';
            ai.src = p.src;
            ai.alt = 'Архив';
            arGrid.appendChild(ai);
          });
          arch.appendChild(arGrid);
          gallery.appendChild(arch);
        }

        // действия папки
        const actions = document.createElement('div');
        actions.className = 'toolbar';
        actions.style.display = 'flex'; actions.style.flexWrap = 'wrap'; actions.style.gap = '8px';

        const addBtn = document.createElement('button');
        addBtn.className = 'btn';
        addBtn.textContent = 'Добавить фото';
        addBtn.style.flex = '1 1 auto';
        addBtn.addEventListener('click', () => createFileInput(folder.id));

        const delFolder = document.createElement('button');
        delFolder.className = 'btn secondary';
        delFolder.textContent = 'Удалить папку';
        delFolder.style.flex = '1 1 auto';
        delFolder.addEventListener('click', () => {
          if (confirm('Удалить папку и все фотографии в ней?')) {
            deleteFolder(folder.id);
            render(); save();
          }
        });

        // массовые операции: перенос выбранных и удаление выбранных
        const moveSelectedBtn = document.createElement('button');
        moveSelectedBtn.className = 'btn';
        moveSelectedBtn.textContent = 'Перенести выбранное';
        moveSelectedBtn.style.flex = '1 1 auto';
        moveSelectedBtn.addEventListener('click', () => {
          const toName = prompt('Переместить в папку: введите точное название');
          if (!toName) return;
          const target = data.folders.find(f => f.name.toLowerCase() === toName.toLowerCase());
          if (!target){ alert('Папка не найдена'); return; }
          const ids = Array.from(folder.photos.filter(p => p.selected).map(p => p.id));
          if (ids.length === 0){ alert('Нет выделенных фото'); return; }
          movePhotos(folder.id, target.id, ids);
          // снять выделение
          folder.photos.forEach(p => p.selected = false);
          render(); save();
        });

        const deleteSelectedBtn = document.createElement('button');
        deleteSelectedBtn.className = 'btn secondary';
        deleteSelectedBtn.textContent = 'Удалить выбранные';
        deleteSelectedBtn.style.flex = '1 1 auto';
        deleteSelectedBtn.addEventListener('click', () => {
          const ids = Array.from(folder.photos.filter(p => p.selected).map(p => p.id));
          if (ids.length === 0){ alert('Нет выделенных фото'); return; }
          if (!confirm('Удалить выделенные фото?')) return;
          folder.photos = folder.photos.filter(p => !p.selected);
          render(); save();
        });

        // массовые операции визуальные: выделение всех
        const selectAllBtn = document.createElement('button');
        selectAllBtn.className = 'btn secondary';
        selectAllBtn.textContent = 'Выделить всё';
        selectAllBtn.style.flex = '1 1 auto';
        selectAllBtn.addEventListener('click', () => {
          folder.photos.forEach(p => p.selected = true);
          render(); save();
        });

        const clearSelBtn = document.createElement('button');
        clearSelBtn.className = 'btn secondary';
        clearSelBtn.style.flex = '1 1 auto';
        clearSelBtn.textContent = 'Снять выделение';
        clearSelBtn.addEventListener('click', () => {
          folder.photos.forEach(p => p.selected = false);
          render(); save();
        });

        actions.appendChild(addBtn);
        actions.appendChild(selectAllBtn);
        actions.appendChild(clearSelBtn);
        actions.appendChild(moveSelectedBtn);
        actions.appendChild(deleteSelectedBtn);
        actions.appendChild(delFolder);

        card.appendChild(header);
        card.appendChild(gallery);
        card.appendChild(actions);

        grid.appendChild(card);
      });
    }

    // Инициализация
    load();
    if (data.folders.length === 0){
      data.folders = [
        { id: 'f1', name: 'Лето', created: Date.now(), photos: [] },
        { id: 'f2', name: 'Зима', created: Date.now(), photos: [] },
        { id: 'f3', name: 'Весна', created: Date.now(), photos: [] },
        { id: 'f4', name: 'Осень', created: Date.now(), photos: [] }
      ];
    }
    render();
    btnAddFolder.addEventListener('click', () => {
      const name = (newFolderName.value || '').trim();
      if (!name) return;
      addFolder(name);
      newFolderName.value = '';
      render(); save();
    });

    lbPrev.addEventListener('click', showPrev);
    lbNext.addEventListener('click', showNext);
    lb.addEventListener('click', (e) => { if (e.target === lb) closeLightbox(); });

    window.addEventListener('beforeunload', save);
  </script>
</body>
</html>
