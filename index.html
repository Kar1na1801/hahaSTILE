<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ТЕСТ - добавление фото</title>
  <style>
    body {
      background: #0f1115;
      color: white;
      font-family: system-ui;
      padding: 20px;
    }
    button {
      background: #7aa2f7;
      border: none;
      padding: 15px 25px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: bold;
      margin: 10px 0;
    }
    img {
      max-width: 100px;
      margin: 5px;
      border-radius: 10px;
    }
    .log {
      background: #1a1e2a;
      padding: 10px;
      border-radius: 10px;
      font-family: monospace;
      font-size: 12px;
      margin-top: 20px;
      max-height: 300px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <h1>🔧 ТЕСТ ЗАГРУЗКИ ФОТО</h1>
  <button id="testBtn">📷 ВЫБРАТЬ ФОТО</button>
  <div id="gallery"></div>
  <div class="log" id="log"></div>

  <script>
    const logDiv = document.getElementById('log');
    
    function log(msg) {
      console.log(msg);
      logDiv.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${msg}</div>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    document.getElementById('testBtn').onclick = () => {
      log('🔘 Кнопка нажата, создаём input...');
      
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.multiple = true;
      
      input.onchange = (e) => {
        log(`📁 Событие onchange сработало! Файлов: ${input.files.length}`);
        
        if (!input.files || input.files.length === 0) {
          log('❌ Нет выбранных файлов');
          return;
        }
        
        const files = Array.from(input.files);
        files.forEach((file, index) => {
          log(`📄 Файл ${index + 1}: ${file.name}, тип: ${file.type}, размер: ${(file.size / 1024).toFixed(1)} KB`);
          
          const reader = new FileReader();
          
          reader.onload = (e) => {
            log(`✅ Файл ${file.name} прочитан, dataURL длина: ${e.target.result.length}`);
            
            // Показываем фото
            const img = document.createElement('img');
            img.src = e.target.result;
            document.getElementById('gallery').appendChild(img);
            
            // Сохраняем в localStorage для проверки
            try {
              localStorage.setItem('test_photo_' + Date.now(), e.target.result);
              log(`💾 Фото сохранено в localStorage`);
            } catch(err) {
              log(`⚠️ Ошибка сохранения в localStorage: ${err.message}`);
            }
          };
          
          reader.onerror = (err) => {
            log(`❌ Ошибка чтения файла ${file.name}: ${err}`);
          };
          
          reader.readAsDataURL(file);
        });
      };
      
      input.click();
      log('🖱️ input.click() вызван, ожидаем выбора файлов...');
    };
    
    log('✅ Страница загружена, жмите кнопку');
  </script>
</body>
</html>
